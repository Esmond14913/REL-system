<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HQA Portal (Local-first)</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone for inline JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS (XLSX) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- Day.js -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>

  <!-- Lucide React Icons (Requires window.react alias) -->
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;
    const { 
      Table, PlusCircle, Trash2, Search, Lock,
      X, Pencil, ChevronLeft, ChevronRight, Box, ClipboardList, 
      Truck, FolderOpen, Filter, Settings, PieChart, RefreshCw, 
      FolderSearch, AlertCircle, FolderLock, Package,
      CheckCircle, FileText
    } = window.LucideReact;

    // ==========================================
    // IndexedDB Helper for Directory Handle
    // ==========================================
    const DB_NAME = 'HQA_LocalDB';
    const STORE_NAME = 'handles';

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const saveHandleToDB = async (handle) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(handle, 'dir_handle');
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    const getHandleFromDB = async () => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get('dir_handle');
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    };

    async function verifyPermission(fileHandle, withWrite) {
      const opts = {};
      if (withWrite) { opts.mode = 'readwrite'; }
      if ((await fileHandle.queryPermission(opts)) === 'granted') { return true; }
      if ((await fileHandle.requestPermission(opts)) === 'granted') { return true; }
      return false;
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);

    const STAGE_SUGGESTIONS = ['All', 'P2', 'EVT', 'DVT', 'PVT', 'MP'];
    const RESULTS = ['On-going', 'Pass', 'Fail', 'On-hold', 'Block', 'N/A', 'Not Start'];

    const getStageStyle = (s) => {
      const m = { P2: 'bg-slate-200 text-slate-700 border-slate-300', EVT: 'bg-orange-100 text-orange-600 border-orange-200', DVT: 'bg-indigo-100 text-indigo-600 border-indigo-200', PVT: 'bg-purple-100 text-purple-600 border-purple-200', MP: 'bg-green-100 text-green-600 border-green-200', ALL: 'bg-blue-100 text-blue-600 border-blue-200' };
      return m[String(s).toUpperCase()] || 'bg-slate-100 border-slate-200';
    };

    const getResultStyle = (r) => {
      const m = { Pass: 'bg-emerald-500 text-white shadow-sm', Fail: 'bg-rose-500 text-white shadow-sm', 'Block': 'bg-rose-700 text-white shadow-sm', 'On-going': 'bg-yellow-400 text-black shadow-sm', 'On-hold': 'bg-white text-slate-700 border-slate-200 shadow-sm', 'N/A': 'bg-black text-white shadow-sm', 'Not Start': 'bg-slate-100 text-slate-400 border-slate-200 shadow-sm' };
      return m[String(r)] || 'bg-slate-100 text-slate-400';
    };

    const SidebarLabel = ({ en, zh }) => (
      <span className="flex flex-col items-start justify-center leading-none text-left pointer-events-none">
        <span className="text-[9px] font-black uppercase tracking-tighter opacity-50 mb-1 block">{String(en)}</span>
        <span className="text-[14px] font-bold tracking-tight whitespace-nowrap block">{String(zh)}</span>
      </span>
    );

    // Dynamic Options Extractor
    const getDynamicOptions = (arr) => {
        return {
            projects: [...new Set(arr.map(a=>a.Project).filter(Boolean))],
            stages: [...new Set(arr.map(a=>a.Stage).filter(Boolean))],
            builds: [...new Set(arr.map(a=>a.Build).filter(Boolean))],
            configs: [...new Set(arr.map(a=>a.Config).filter(Boolean))]
        };
    };

    function App() {
      const [activeTab, setActiveTab] = useState('settings'); 
      const [dirHandle, setDirHandle] = useState(null);
      const [retentionDays, setRetentionDays] = useState(parseInt(localStorage.getItem('retention_days') || '30', 10));
      const [message, setMessage] = useState('');

      const [records, setRecords] = useState([]);
      const [samples, setSamples] = useState([]);
      const [configsList, setConfigsList] = useState([]); 
      const [readinessItems, setReadinessItems] = useState([]);
      const [documents, setDocuments] = useState([]);

      const [searchTerm, setSearchTerm] = useState('');
      const [isAdmin, setIsAdmin] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);

      const [filterProject, setFilterProject] = useState('All');
      const [filterStage, setFilterStage] = useState('All');
      const [filterBuild, setFilterBuild] = useState('All');
      const [filterConfig, setFilterConfig] = useState('All');
      const [filterResult, setFilterResult] = useState('All');
      const [filterKeeper, setFilterKeeper] = useState('All');
      const [filterStatus, setFilterStatus] = useState('All');

      const [editingRecord, setEditingRecord] = useState(null);
      const [editingSample, setEditingSample] = useState(null);
      const [editingConfig, setEditingConfig] = useState(null);
      const [editingReadiness, setEditingReadiness] = useState(null);
      const [editingDocument, setEditingDocument] = useState(null);

      useEffect(() => {
        const initLocalFS = async () => {
          try {
            const storedHandle = await getHandleFromDB();
            if (storedHandle && await verifyPermission(storedHandle, true)) {
              setDirHandle(storedHandle);
              await loadAndCleanupExcelData(storedHandle, retentionDays);
              setActiveTab('records');
            }
          } catch (err) { console.warn('Silent local handle restore failed:', err); }
        };
        initLocalFS();
      }, []);

      useEffect(() => { localStorage.setItem('retention_days', retentionDays.toString()); }, [retentionDays]);

      const autoCleanup = async (handle, rDays) => {
        if (!handle) return;
        try {
          const thresholdDate = dayjs().subtract(rDays, 'day');
          for await (const entry of handle.values()) {
            if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_') && entry.name.endsWith('.xlsx')) {
               const dateStr = entry.name.replace('HQA_Master_', '').replace('.xlsx', '');
               if (dateStr.length === 8) {
                  const fileDate = dayjs(`${dateStr.substring(0,4)}-${dateStr.substring(4,6)}-${dateStr.substring(6,8)}`);
                  if (fileDate.isValid() && fileDate.isBefore(thresholdDate, 'day')) {
                     await handle.removeEntry(entry.name);
                     console.log(`Auto Cleanup: Deleted old backup ${entry.name}`);
                  }
               }
            }
          }
        } catch(err) { console.error('Cleanup failed:', err); }
      };

      const loadAndCleanupExcelData = async (handle, rDays) => {
        try {
          if (!handle) return;
          setMessage('Scanning folder...');
          let latestFileHandle = null;
          let latestDateStr = '';
          for await (const entry of handle.values()) {
             if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_') && entry.name.endsWith('.xlsx')) {
                const dateStr = entry.name.replace('HQA_Master_', '').replace('.xlsx', '');
                if (dateStr > latestDateStr) { latestDateStr = dateStr; latestFileHandle = entry; }
             }
          }
          if (!latestFileHandle) {
             setMessage('No existing Excel found. A new one will be created upon first save.');
             setRecords([]); setSamples([]); setConfigsList([]); setReadinessItems([]); setDocuments([]);
             return;
          }
          setMessage(`Loading ${latestFileHandle.name}...`);
          const file = await latestFileHandle.getFile();
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: 'array' });
          const getSheetData = (name) => {
             const sheet = wb.Sheets[name];
             if (!sheet) return [];
             return XLSX.utils.sheet_to_json(sheet).map(row => ({ id: generateId(), ...row }));
          };
          setRecords(getSheetData('Records'));
          setSamples(getSheetData('Tracking'));
          setConfigsList(getSheetData('Config'));
          setReadinessItems(getSheetData('Readiness'));
          setDocuments(getSheetData('Documents'));
          setMessage('Ready.');
          autoCleanup(handle, rDays);
        } catch(err) { console.error('Load Excel failed:', err); setMessage('Error loading Excel.'); }
      };

      const saveToExcel = async (payload) => {
        if (!dirHandle) return;
        setMessage('Saving...');
        try {
          const today = dayjs().format('YYYYMMDD');
          const fileName = `HQA_Master_${today}.xlsx`;
          const prepare = (arr) => arr.map(r => { const {id, ...rest} = r; return rest; });
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.records || records)), 'Records');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.samples || samples)), 'Tracking');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.configsList || configsList)), 'Config');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.readinessItems || readinessItems)), 'Readiness');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.documents || documents)), 'Documents');
          const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
          const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(wbout);
          await writable.close();
          setMessage(`Saved to ${fileName}`);
          setTimeout(()=>setMessage('Ready.'), 3000);
        } catch(err) { console.error('Save failed:', err); setMessage('Failed to save file.'); }
      };

      const connectDirectory = async () => {
        try {
          const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
          await saveHandleToDB(handle);
          setDirHandle(handle);
          await loadAndCleanupExcelData(handle, retentionDays);
          setActiveTab('records');
        } catch (err) { console.warn('Directory selection cancelled'); }
      };
      const filteredRecords = records.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterBuild !== 'All' && r.Build !== filterBuild) return false;
         if (filterConfig !== 'All' && r.Config !== filterConfig) return false;
         if (filterResult !== 'All' && r.Result !== filterResult) return false;
         return true;
      });
      const filteredSamples = samples.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterBuild !== 'All' && r.Build !== filterBuild) return false;
         if (filterKeeper !== 'All' && r.Keeper !== filterKeeper) return false;
         return true;
      });
      const filteredConfigs = configsList.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterBuild !== 'All' && r.Build !== filterBuild) return false;
         return true;
      });
      const filteredReadiness = readinessItems.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterStatus !== 'All' && r.Status !== filterStatus) return false;
         return true;
      });
      const filteredDocuments = documents.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         return true;
      });

      const handleUpdate = async (type, item) => {
        let payload = {};
        if (type === 'record') { const n = records.map(x => x.id === item.id ? item : x); setRecords(n); payload.records = n; }
        else if (type === 'sample') { const n = samples.map(x => x.id === item.id ? item : x); setSamples(n); payload.samples = n; }
        else if (type === 'config') { const n = configsList.map(x => x.id === item.id ? item : x); setConfigsList(n); payload.configsList = n; }
        else if (type === 'readiness') { const n = readinessItems.map(x => x.id === item.id ? item : x); setReadinessItems(n); payload.readinessItems = n; }
        else if (type === 'document') { const n = documents.map(x => x.id === item.id ? item : x); setDocuments(n); payload.documents = n; }
        await saveToExcel(payload);
        setEditingRecord(null); setEditingSample(null); setEditingConfig(null); setEditingReadiness(null); setEditingDocument(null);
      };

      const deleteItem = async (id, type) => {
        if (!window.confirm('Delete this item?')) return;
        let payload = {};
        if (type === 'records') { const n = records.filter(x => x.id !== id); setRecords(n); payload.records = n; }
        else if (type === 'samples') { const n = samples.filter(x => x.id !== id); setSamples(n); payload.samples = n; }
        else if (type === 'configsList') { const n = configsList.filter(x => x.id !== id); setConfigsList(n); payload.configsList = n; }
        else if (type === 'readinessItems') { const n = readinessItems.filter(x => x.id !== id); setReadinessItems(n); payload.readinessItems = n; }
        else if (type === 'documents') { const n = documents.filter(x => x.id !== id); setDocuments(n); payload.documents = n; }
        await saveToExcel(payload);
      };

      return (
        <div className="min-h-screen bg-[#f1f5f9] flex flex-col md:flex-row font-sans text-slate-900 overflow-hidden">
          <datalist id="stage-options">{STAGE_SUGGESTIONS.map(o => <option key={o} value={o} />)}</datalist>

          {/* Sidebar */}
          <nav className={`h-screen bg-slate-900 text-white flex flex-col shadow-2xl transition-all ${isSidebarOpen ? 'w-72' : 'w-20'}`}>
            <div className="p-6 flex items-center justify-between border-b border-slate-800">
              {isSidebarOpen ? <div className="flex flex-col"><div className="flex items-center gap-3 text-indigo-500 font-black text-xl">HQA PORTAL</div><div className="text-xs text-slate-400 font-medium tracking-widest mt-1">BY ESMOND</div></div> : <Lock className="mx-auto text-indigo-500" />}
              <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1 hover:bg-slate-800 rounded">{isSidebarOpen ? <ChevronLeft /> : <ChevronRight />}</button>
            </div>
            <div className="flex-1 mt-6 px-4 space-y-1 overflow-y-auto">
              {[
                { id: 'records', icon: Table, zh: '撖阡?蝝?? },
                { id: 'tracking', icon: Box, zh: '璅?餈質馱' },
                { id: 'config_recipes', icon: ClipboardList, zh: '?蔭閬' },
                { id: 'readiness', icon: CheckCircle, zh: '皞???? },
                { id: 'documents', icon: FileText, zh: '?辣蝞∠?' },
                { id: 'stats', icon: PieChart, zh: '蝬?蝯梯?' },
                { id: 'inventory', icon: Package, zh: '璅?摨怠?' },
                { id: 'settings', icon: Settings, zh: '蝟餌絞閮剖?' }
              ].map(tab => {
                const Icon = tab.icon;
                return (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${activeTab === tab.id ? 'bg-indigo-600 shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}>
                    <Icon size={20}/>
                    {isSidebarOpen && <SidebarLabel en={tab.id.replace('_', ' ')} zh={tab.zh} />}
                  </button>
                )
              })}
            </div>
            <div className="p-4 border-t border-slate-800 flex flex-col gap-2">
               <div className={`text-xs ${dirHandle ? 'text-emerald-400' : 'text-rose-400'} flex items-center gap-2 truncate`}><FolderSearch size={14} /> {dirHandle ? dirHandle.name : 'No Folder Connected'}</div>
               <button onClick={() => setIsAdmin(!isAdmin)} className="w-full py-3 rounded-xl bg-slate-700 hover:bg-indigo-500 transition-colors text-xs font-black uppercase shadow-lg">{isAdmin ? 'Readonly Mode' : 'Admin Mode'}</button>
            </div>
          </nav>

          {/* Main Area */}
          <main className="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header className="px-8 py-6 bg-white border-b flex justify-between items-center">
              <div><h2 className="text-2xl font-black uppercase">{activeTab.replace('_', ' ')}</h2><p className="text-xs text-indigo-600 font-bold tracking-widest">{message || 'LOCAL-FIRST ARCHITECTURE'}</p></div>
              <div className="flex gap-3">
                 <div className="relative"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16}/><input onChange={e=>setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2 bg-slate-100 rounded-xl outline-none w-64" placeholder="Quick search..."/></div>
                 {dirHandle && <button onClick={()=>loadAndCleanupExcelData(dirHandle, retentionDays)} className="p-2 border rounded-xl hover:bg-slate-50 relative group"><RefreshCw size={20}/></button>}
              </div>
            </header>

            <div className="flex-1 overflow-auto p-8 space-y-6">
              {!dirHandle && activeTab !== 'settings' ? (
                <div className="flex flex-col items-center justify-center h-full text-slate-400">
                   <AlertCircle size={48} className="mb-4 text-slate-300"/>
                   <h3 className="text-xl font-bold mb-2">Folder Not Connected</h3>
                   <p className="mb-4 text-sm">Please go to System Settings to select a local folder for Excel data storage.</p>
                   <button onClick={()=>setActiveTab('settings')} className="px-6 py-2 bg-indigo-600 text-white rounded-full font-bold">Go to Settings</button>
                </div>
              ) : (
                <>
                {/* SETTINGS TAB */}
                {activeTab === 'settings' && (
                  <div className="max-w-2xl bg-white p-8 rounded-3xl shadow-sm border">
                     <h3 className="text-lg font-black uppercase border-b pb-4 mb-6"><Settings className="inline mr-2"/> Settings & Local Connection</h3>
                     <div className="space-y-6">
                        <div>
                           <label className="block text-sm font-bold text-slate-500 mb-2">Local Master Folder</label>
                           <div className="flex items-center gap-4">
                             <div className="flex-1 p-3 bg-slate-100 rounded-xl font-mono text-sm border flex items-center gap-2">{dirHandle ? <React.Fragment><FolderLock className="text-emerald-500"/> {dirHandle.name}</React.Fragment> : <React.Fragment><AlertCircle className="text-rose-500"/> Not Connected</React.Fragment>}</div>
                             <button onClick={connectDirectory} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl border border-indigo-700">{dirHandle ? 'Change Folder' : 'Connect Folder'}</button>
                           </div>
                        </div>
                        <div>
                           <label className="block text-sm font-bold text-slate-500 mb-2">Excel Retention Days</label>
                           <input type="number" min="1" max="365" value={retentionDays} onChange={e=>setRetentionDays(parseInt(e.target.value,10))} className="w-full p-3 border rounded-xl bg-slate-50"/>
                        </div>
                     </div>
                  </div>
                )}
                {/* RECORDS TAB */}
                {activeTab === 'records' && (
                  <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                     <div className="bg-white p-6 rounded-3xl shadow-sm border flex items-center justify-between gap-4">
                        <div className="flex gap-4">
                          <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Projects</option>{getDynamicOptions(records).projects.map(p=><option key={p} value={p}>{p}</option>)}</select>
                          <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Stages</option>{getDynamicOptions(records).stages.map(p=><option key={p} value={p}>{p}</option>)}</select>
                          <select value={filterBuild} onChange={e=>setFilterBuild(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Builds</option>{getDynamicOptions(records).builds.map(p=><option key={p} value={p}>{p}</option>)}</select>
                          <select value={filterConfig} onChange={e=>setFilterConfig(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Configs</option>{getDynamicOptions(records).configs.map(p=><option key={p} value={p}>{p}</option>)}</select>
                          <select value={filterResult} onChange={e=>setFilterResult(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Results</option>{[...new Set(records.map(r=>r.Result).filter(Boolean))].map(p=><option key={p} value={p}>{p}</option>)}</select>
                        </div>
                        {isAdmin && <button onClick={() => setEditingRecord({ id: generateId() })} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-800 transition-colors"><PlusCircle size={18}/> New Record</button>}
                     </div>
                     <div className="bg-white rounded-3xl shadow-sm border overflow-x-auto">
                        <table className="w-full text-left border-collapse whitespace-nowrap">
                          <thead className="bg-slate-50 border-b">
                             <tr className="text-xs uppercase text-slate-400">
                               <th className="p-4">Project / 撠?</th><th className="p-4">Stage / ?挾</th><th className="p-4">Build / ?</th><th className="p-4">Config / ?蔭</th>
                               <th className="p-4">Category / 憿</th><th className="p-4">Test item / 皜祈岫?</th><th className="p-4">Q'ty / ?賊?</th>
                               <th className="p-4">Start / ??</th><th className="p-4">End / 蝯?</th><th className="p-4 text-center">Result / 蝯?</th><th className="p-4 flex justify-center text-center">Report / ?勗?</th><th className="p-4">Remark / ?酉</th>
                               {isAdmin && <th className="p-4 text-center">Action</th>}
                             </tr>
                          </thead>
                          <tbody className="divide-y text-sm">
                             {filteredRecords.map(r => (
                               <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                 <td className="p-4 font-bold">{String(r.Project||'')}</td>
                                 <td className="p-4"><span className={`px-2 py-1 rounded-lg border text-xs ${getStageStyle(r.Stage)}`}>{String(r.Stage||'')}</span></td>
                                 <td className="p-4 font-bold">{String(r.Build||'')}</td>
                                 <td className="p-4 font-mono text-slate-500">{String(r.Config||'')}</td>
                                 <td className="p-4 text-indigo-600 font-bold">{String(r.Category||'')}</td>
                                 <td className="p-4">{String(r['Test item']||'')}</td>

              <div className="bg-white rounded-[2rem] w-full max-w-4xl p-10 space-y-6 animate-in zoom-in-95 shadow-2xl border max-h-[90vh] overflow-y-auto">
                 <div className="flex justify-between items-center border-b pb-4"><h3 className="text-xl font-black uppercase text-indigo-600">{editingSample.Project ? 'Edit Sample' : 'New Sample'}</h3><button type="button" onClick={()=>setEditingSample(null)} className="p-2 hover:bg-slate-100 rounded-full"><X/></button></div>
                 <form onSubmit={e=>{e.preventDefault(); handleUpdate('sample', editingSample)}} className="grid grid-cols-4 gap-6 text-[11px] font-bold">
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">Project<input value={editingSample.Project||''} onChange={e=>setEditingSample({...editingSample, Project:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">Stage<input value={editingSample.Stage||''} onChange={e=>setEditingSample({...editingSample, Stage:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">Build<input value={editingSample.Build||''} onChange={e=>setEditingSample({...editingSample, Build:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">Config<input value={editingSample.Config||''} onChange={e=>setEditingSample({...editingSample, Config:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">DUT ID<input value={editingSample['DUT ID']||''} onChange={e=>setEditingSample({...editingSample, 'DUT ID':e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">SN<input value={editingSample.SN||''} onChange={e=>setEditingSample({...editingSample, SN:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">Keeper<input value={editingSample.Keeper||''} onChange={e=>setEditingSample({...editingSample, Keeper:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">ITEM1<input value={editingSample.item1||''} onChange={e=>setEditingSample({...editingSample, item1:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">ITEM2<input value={editingSample.item2||''} onChange={e=>setEditingSample({...editingSample, item2:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-rose-500 uppercase tracking-widest text-[9px]">FAILURE<input value={editingSample.Failure||''} onChange={e=>setEditingSample({...editingSample, Failure:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-rose-50 border border-rose-200 rounded-xl"/></div>
                    <div className="col-span-2 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">FA REPORT LINK<input value={editingSample['FA report']||''} onChange={e=>setEditingSample({...editingSample, 'FA report':e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl" placeholder="https://..."/></div>
                    <div className="col-span-4 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">REMARK<input value={editingSample.Remark||''} onChange={e=>setEditingSample({...editingSample, Remark:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-4 pt-4"><button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-slate-900 transition-colors text-white rounded-2xl shadow-xl uppercase">Save Sample</button></div>
                 </form>
              </div>
            </div>
          )}

          {/* Config Modal */}
          {editingConfig && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] w-full max-w-3xl p-10 space-y-6 animate-in zoom-in-95 shadow-2xl border max-h-[90vh] overflow-y-auto">
                 <div className="flex justify-between items-center border-b pb-4"><h3 className="text-xl font-black uppercase text-indigo-600">{editingConfig.Project ? 'Edit Config' : 'New Config'}</h3><button type="button" onClick={()=>setEditingConfig(null)} className="p-2 hover:bg-slate-100 rounded-full"><X/></button></div>
                 <form onSubmit={e=>{e.preventDefault(); handleUpdate('config', editingConfig)}} className="grid grid-cols-2 gap-6 text-[11px] font-bold">
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">PROJECT<input value={editingConfig.Project||''} onChange={e=>setEditingConfig({...editingConfig, Project:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">STAGE<input value={editingConfig.Stage||''} onChange={e=>setEditingConfig({...editingConfig, Stage:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">BUILD<input value={editingConfig.Build||''} onChange={e=>setEditingConfig({...editingConfig, Build:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">CONFIG<input value={editingConfig.Config||''} onChange={e=>setEditingConfig({...editingConfig, Config:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">SIZE<input value={editingConfig.Size||''} onChange={e=>setEditingConfig({...editingConfig, Size:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">DESCRIPTION<input value={editingConfig.Description||''} onChange={e=>setEditingConfig({...editingConfig, Description:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-2 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">REMARK<input value={editingConfig.Remark||''} onChange={e=>setEditingConfig({...editingConfig, Remark:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-2 pt-4"><button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-slate-900 transition-colors text-white rounded-2xl shadow-xl uppercase">Save Config</button></div>
                 </form>
              </div>
            </div>
          )}

          {/* Readiness Modal */}
          {editingReadiness && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] w-full max-w-4xl p-10 space-y-6 animate-in zoom-in-95 shadow-2xl border max-h-[90vh] overflow-y-auto">
                 <div className="flex justify-between items-center border-b pb-4"><h3 className="text-xl font-black uppercase text-indigo-600">{editingReadiness.Project ? 'Edit Readiness' : 'New Item'}</h3><button type="button" onClick={()=>setEditingReadiness(null)} className="p-2 hover:bg-slate-100 rounded-full"><X/></button></div>
                 <form onSubmit={e=>{e.preventDefault(); handleUpdate('readiness', editingReadiness)}} className="grid grid-cols-3 gap-6 text-[11px] font-bold">
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">PROJECT<input value={editingReadiness.Project||''} onChange={e=>setEditingReadiness({...editingReadiness, Project:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">STAGE<input value={editingReadiness.Stage||''} onChange={e=>setEditingReadiness({...editingReadiness, Stage:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">CATEGORY<input value={editingReadiness.Category||''} onChange={e=>setEditingReadiness({...editingReadiness, Category:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-2 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">ITEM<input value={editingReadiness.Item||''} onChange={e=>setEditingReadiness({...editingReadiness, Item:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">NUMBERS<input type="number" value={editingReadiness.Numbers||''} onChange={e=>setEditingReadiness({...editingReadiness, Numbers:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">ETA<input type="date" value={editingReadiness.ETA||''} onChange={e=>setEditingReadiness({...editingReadiness, ETA:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">STATUS<select value={editingReadiness.Status||''} onChange={e=>setEditingReadiness({...editingReadiness, Status:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"><option value=""></option><option value="Ready">Ready</option><option value="Pending">Pending</option><option value="Delayed">Delayed</option></select></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">PO<input value={editingReadiness.PO||''} onChange={e=>setEditingReadiness({...editingReadiness, PO:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-3 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">REMARK<input value={editingReadiness.Remark||''} onChange={e=>setEditingReadiness({...editingReadiness, Remark:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-3 pt-4"><button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-slate-900 transition-colors text-white rounded-2xl shadow-xl uppercase">Save Item</button></div>
                 </form>
              </div>
            </div>
          )}

          {/* Documents Modal */}
          {editingDocument && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] w-full max-w-3xl p-10 space-y-6 animate-in zoom-in-95 shadow-2xl border max-h-[90vh] overflow-y-auto">
                 <div className="flex justify-between items-center border-b pb-4"><h3 className="text-xl font-black uppercase text-indigo-600">{editingDocument.Project ? 'Edit Document' : 'New Document'}</h3><button type="button" onClick={()=>setEditingDocument(null)} className="p-2 hover:bg-slate-100 rounded-full"><X/></button></div>
                 <form onSubmit={e=>{e.preventDefault(); handleUpdate('document', editingDocument)}} className="grid grid-cols-2 gap-6 text-[11px] font-bold">
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">PROJECT<input value={editingDocument.Project||''} onChange={e=>setEditingDocument({...editingDocument, Project:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">STAGE<input value={editingDocument.Stage||''} onChange={e=>setEditingDocument({...editingDocument, Stage:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-2 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">DOCUMENT NAME<input value={editingDocument['Document name']||''} onChange={e=>setEditingDocument({...editingDocument, 'Document name':e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-2 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">LINK<input value={editingDocument.Link||''} onChange={e=>setEditingDocument({...editingDocument, Link:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl" placeholder="https://..."/></div>
                    <div className="col-span-2 space-y-1 text-slate-500 uppercase tracking-widest text-[9px]">REMARK<input value={editingDocument.Remark||''} onChange={e=>setEditingDocument({...editingDocument, Remark:e.target.value})} className="w-full text-sm font-medium text-slate-800 p-3 bg-slate-50 border rounded-xl"/></div>
                    <div className="col-span-2 pt-4"><button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-slate-900 transition-colors text-white rounded-2xl shadow-xl uppercase">Save Document</button></div>
                 </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
