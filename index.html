<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL Lab Dashboard - Local-first</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-512.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;
    const { 
      Table, PlusCircle, Trash2, Search, Lock,
      X, Pencil, ChevronLeft, ChevronRight, Box, ClipboardList, 
      Truck, FolderOpen, Filter, Settings, PieChart, RefreshCw, 
      FolderSearch, AlertCircle, FolderLock, Package,
      CheckCircle, FileText, Layers, LayoutList, RotateCcw,
      HelpCircle, Calculator, Wrench, Activity, Info
    } = window.LucideReact;

    const DB_NAME = 'HQA_LocalDB';
    const STORE_NAME = 'handles';

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const saveHandleToDB = async (handle) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(handle, 'dir_handle');
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    const getHandleFromDB = async () => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get('dir_handle');
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    };

    async function verifyPermission(fileHandle, withWrite) {
      const opts = {};
      if (withWrite) { opts.mode = 'readwrite'; }
      if ((await fileHandle.queryPermission(opts)) === 'granted') { return true; }
      if ((await fileHandle.requestPermission(opts)) === 'granted') { return true; }
      return false;
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const STAGE_SUGGESTIONS = ['All', 'P2', 'EVT', 'DVT', 'PVT', 'MP'];
    const RESULTS = ['On-going', 'Pass', 'Fail', 'Completed', 'On-hold', 'N/A', 'Not Start'];

    const getStageStyle = (s) => {
      const m = { P2: 'bg-slate-200 text-slate-700 border-slate-300', EVT: 'bg-orange-100 text-orange-600 border-orange-200', DVT: 'bg-indigo-100 text-indigo-600 border-indigo-200', PVT: 'bg-purple-100 text-purple-600 border-purple-200', MP: 'bg-green-100 text-green-600 border-green-200', ALL: 'bg-blue-100 text-blue-600 border-blue-200' };
      return m[String(s).toUpperCase()] || 'bg-slate-100 border-slate-200';
    };

    const getResultStyle = (r) => {
      const m = { 
        Pass: 'bg-emerald-500 text-white shadow-sm', 
        Fail: 'bg-rose-500 text-white shadow-sm', 
        'Completed': 'bg-blue-800 text-white shadow-sm',
        'On-going': 'bg-yellow-400 text-black shadow-sm', 
        'On-hold': 'bg-white text-slate-700 border-slate-200 shadow-sm', 
        'N/A': 'bg-black text-white shadow-sm', 
        'Not Start': 'bg-slate-100 text-slate-400 border-slate-200 shadow-sm' 
      };
      return m[String(r)] || 'bg-slate-100 text-slate-400';
    };

    const SidebarLabel = ({ en, zh }) => (
      <span className="flex flex-col items-start justify-center leading-none text-left pointer-events-none">
        <span className="text-[9px] font-black uppercase tracking-tighter opacity-50 mb-1 block">{String(en)}</span>
        <span className="text-[14px] font-bold tracking-tight whitespace-nowrap block">{String(zh)}</span>
      </span>
    );

    const getDynamicOptions = (arr) => {
        return {
            projects: [...new Set(arr.map(a=>a.Project).filter(Boolean))],
            stages: [...new Set(arr.map(a=>a.Stage).filter(Boolean))],
            builds: [...new Set(arr.map(a=>a.Build).filter(Boolean))],
            configs: [...new Set(arr.map(a=>a.Config).filter(Boolean))],
            keepers: [...new Set(arr.map(a=>a.Keeper).filter(Boolean))]
        };
    };

    function App() {
      const APP_VERSION = 'v1.3.3';
      const [activeTab, setActiveTab] = useState('settings'); 
      const [dirHandle, setDirHandle] = useState(null);
      const [retentionDays, setRetentionDays] = useState(parseInt(localStorage.getItem('retention_days') || '30', 10));
      const [message, setMessage] = useState('');

      const [records, setRecords] = useState([]);
      const [samples, setSamples] = useState([]);
      const [configsList, setConfigsList] = useState([]); 
      const [readinessItems, setReadinessItems] = useState([]);
      const [documents, setDocuments] = useState([]);

      const [searchTerm, setSearchTerm] = useState('');
      const [isAdmin, setIsAdmin] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);

      const [statsCalcMode, setStatsCalcMode] = useState('overall'); // 'overall' | 'category'
      const [inventoryGroupBy, setInventoryGroupBy] = useState('keeper'); // 'keeper' | 'stagebuild'
      const [inventorySubView, setInventorySubView] = useState('detail'); // 'detail' | 'config'

      const [filterProject, setFilterProject] = useState('All');
      const [filterStage, setFilterStage] = useState('All');
      const [filterBuild, setFilterBuild] = useState('All');
      const [filterConfig, setFilterConfig] = useState('All');
      const [filterResult, setFilterResult] = useState('All');
      const [filterKeeper, setFilterKeeper] = useState('All');
      const [filterStatus, setFilterStatus] = useState('All');

      const [editingRecord, setEditingRecord] = useState(null);
      const [editingSample, setEditingSample] = useState(null);
      const [editingConfig, setEditingConfig] = useState(null);
      const [editingReadiness, setEditingReadiness] = useState(null);
      const [editingDocument, setEditingDocument] = useState(null);
      const [showEaRef, setShowEaRef] = useState(false);
      const [activeTool, setActiveTool] = useState(null);

      // REL Tools States
      const [afTuse, setAfTuse] = useState(25);
      const [afTtest, setAfTtest] = useState(85);
      const [afEa, setAfEa] = useState(0.7);
      const [stMTBF, setStMTBF] = useState(100000);
      const [stCL, setStCL] = useState(90);
      const [stSamples, setStSamples] = useState(32);
      const [convVal, setConvVal] = useState(1);
      const [convType, setConvType] = useState('length'); 
      const [profileSteps, setProfileSteps] = useState([
        { id: generateId(), type: 'Ramp', time: 30, temp: 25 },
        { id: generateId(), type: 'Soak', time: 60, temp: 85 },
        { id: generateId(), type: 'Ramp', time: 30, temp: 25 }
      ]);

      const calcAF = useMemo(() => {
        const k = 8.61733e-5; 
        const t1 = parseFloat(afTuse) + 273.15;
        const t2 = parseFloat(afTtest) + 273.15;
        const ea = parseFloat(afEa);
        if (t1 <= 0 || t2 <= 0 || isNaN(ea)) return 1;
        return Math.exp((ea / k) * (1/t1 - 1/t2));
      }, [afTuse, afTtest, afEa]);

      const calcTestTime = useMemo(() => {
        const cl = parseFloat(stCL) / 100;
        const n = parseFloat(stSamples);
        const mtbf = parseFloat(stMTBF);
        const af = calcAF;
        if (n <= 0 || af <= 0 || cl >= 1) return 0;
        return (mtbf * (-Math.log(1 - cl))) / (n * af);
      }, [stMTBF, stCL, stSamples, calcAF]);

      const resetFilters = () => {
        setFilterProject('All'); setFilterStage('All'); setFilterBuild('All');
        setFilterConfig('All'); setFilterResult('All'); setFilterKeeper('All');
        setFilterStatus('All'); setSearchTerm('');
      };

      useEffect(() => {
        const initLocalFS = async () => {
          try {
            const storedHandle = await getHandleFromDB();
            if (storedHandle && await verifyPermission(storedHandle, true)) {
              setDirHandle(storedHandle);
              await loadAndCleanupExcelData(storedHandle, retentionDays);
              setActiveTab('records');
            }
          } catch (err) { console.warn('Silent local handle restore failed:', err); }
        };
        initLocalFS();
      }, []);

      useEffect(() => { localStorage.setItem('retention_days', retentionDays.toString()); }, [retentionDays]);

      const autoCleanup = async (handle, rDays) => {
        if (!handle) return;
        try {
          const thresholdDate = dayjs().subtract(rDays, 'day');
          for await (const entry of handle.values()) {
            if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_') && entry.name.endsWith('.xlsx')) {
               const dateStr = entry.name.replace('HQA_Master_', '').replace('.xlsx', '');
               if (dateStr.length === 8) {
                  const fileDate = dayjs(`${dateStr.substring(0,4)}-${dateStr.substring(4,6)}-${dateStr.substring(6,8)}`);
                  if (fileDate.isValid() && fileDate.isBefore(thresholdDate, 'day')) {
                     await handle.removeEntry(entry.name);
                     console.log(`Auto Cleanup: Deleted old backup ${entry.name}`);
                  }
               }
            }
          }
        } catch(err) { console.error('Cleanup failed:', err); }
      };

      const loadAndCleanupExcelData = async (handle, rDays) => {
        try {
          if (!handle) return;
          setMessage('Scanning folder...');
          let latestFileHandle = null;
          let latestDateStr = '';
          for await (const entry of handle.values()) {
             if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_') && entry.name.endsWith('.xlsx')) {
                const dateStr = entry.name.replace('HQA_Master_', '').replace('.xlsx', '');
                if (dateStr > latestDateStr) { latestDateStr = dateStr; latestFileHandle = entry; }
             }
          }
          if (!latestFileHandle) {
             setMessage('No existing Excel found. A new one will be created upon first save.');
             setRecords([]); setSamples([]); setConfigsList([]); setReadinessItems([]); setDocuments([]);
             return;
          }
          setMessage(`Loading ${latestFileHandle.name}...`);
          const file = await latestFileHandle.getFile();
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: 'array' });
          const getSheetData = (name) => {
             const sheet = wb.Sheets[name];
             if (!sheet) return [];
             return XLSX.utils.sheet_to_json(sheet, { raw: false, dateNF: "yyyy-mm-dd" }).map(row => ({ id: generateId(), ...row }));
          };
          setRecords(getSheetData('Records'));
          setSamples(getSheetData('Tracking'));
          setConfigsList(getSheetData('Config'));
          setReadinessItems(getSheetData('Readiness'));
          setDocuments(getSheetData('Documents'));
          setMessage('Ready.');
          autoCleanup(handle, rDays);
        } catch(err) { console.error('Load Excel failed:', err); setMessage('Error loading Excel.'); }
      };

      const saveToExcel = async (payload) => {
        if (!dirHandle) return;
        setMessage('Saving...');
        try {
          const today = dayjs().format('YYYYMMDD');
          const fileName = `HQA_Master_${today}.xlsx`;
          const prepare = (arr) => arr.map(r => { const {id, ...rest} = r; return rest; });
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.records || records)), 'Records');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.samples || samples)), 'Tracking');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.configsList || configsList)), 'Config');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.readinessItems || readinessItems)), 'Readiness');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.documents || documents)), 'Documents');
          const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
          const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(wbout);
          await writable.close();
          setMessage(`Saved to ${fileName}`);
          setTimeout(()=>setMessage('Ready.'), 3000);
        } catch(err) { console.error('Save failed:', err); setMessage('Failed to save file.'); }
      };

       const downloadTemplate = () => {
        try {
          alert('Generating Template / 正在生成模板...');
          const today = dayjs().format('YYYYMMDD');
          const fileName = `HQA_Master_${today}.xlsx`;
          const wb = XLSX.utils.book_new();
          const createEmpty = (cols) => {
            const obj = {};
            cols.forEach(c => obj[c] = "");
            return [obj];
          };
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createEmpty(["Project", "Stage", "Build", "Config", "Category", "Test item", "Q'ty", "Start", "End", "Result", "Report", "Remark"])), 'Records');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createEmpty(["Project", "Stage", "Build", "Config", "DUT ID", "SN", "Keeper", "item1", "item2", "Failure", "FA report", "Remark"])), 'Tracking');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createEmpty(["Project", "Stage", "Build", "Config", "Description", "Remark"])), 'Config');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createEmpty(["Project", "Stage", "Category", "Item", "Status", "Remark"])), 'Readiness');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createEmpty(["Project", "Stage", "Document name", "Link", "Remark"])), 'Documents');
          XLSX.writeFile(wb, fileName);
          alert('Download Started / 開始下載...');
        } catch (err) {
          alert('Download Failed / 下載失敗: ' + err.message);
        }
      };

      const connectDirectory = async () => {
        try {
          const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
          await saveHandleToDB(handle);
          setDirHandle(handle);
          await loadAndCleanupExcelData(handle, retentionDays);
          setActiveTab('records');
        } catch (err) { console.warn('Directory selection cancelled'); }
      };

      const checkUpdate = async () => {
        if (!('serviceWorker' in navigator)) {
          alert('Local version - no update available.');
          return;
        }
        setMessage('Checking for updates...');
        try {
          const registration = await navigator.serviceWorker.getRegistration();
          if (registration) {
            await registration.update();
            setMessage('Check complete.');
            alert('Check complete. If a new version was found, it will be applied on next load.');
          }
        } catch (err) {
          console.error('Update check failed:', err);
          setMessage('Update check failed.');
        }
      };

       const filteredRecords = records.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterBuild !== 'All' && r.Build !== filterBuild) return false;
         if (filterConfig !== 'All' && r.Config !== filterConfig) return false;
         if (filterResult !== 'All' && r.Result !== filterResult) return false;
         if (searchTerm) {
           const s = searchTerm.toLowerCase();
           return (r.Project || '').toLowerCase().includes(s) || 
                  (r['Test item'] || '').toLowerCase().includes(s) || 
                  (r.Category || '').toLowerCase().includes(s) || 
                  (r.Remark || '').toLowerCase().includes(s);
         }
         return true;
      });
      const filteredSamples = samples.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterBuild !== 'All' && r.Build !== filterBuild) return false;
         if (filterConfig !== 'All' && r.Config !== filterConfig) return false;
         if (filterKeeper !== 'All' && r.Keeper !== filterKeeper) return false;
         if (searchTerm) {
           const s = searchTerm.toLowerCase();
           return (r.Project || '').toLowerCase().includes(s) || 
                  (r.SN || '').toLowerCase().includes(s) || 
                  (r['DUT ID'] || '').toLowerCase().includes(s) || 
                  (r.Keeper || '').toLowerCase().includes(s) ||
                  (r.Remark || '').toLowerCase().includes(s);
         }
         return true;
      });
      const filteredConfigs = configsList.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterBuild !== 'All' && r.Build !== filterBuild) return false;
         if (searchTerm) {
           const s = searchTerm.toLowerCase();
           return (r.Project || '').toLowerCase().includes(s) || 
                  (r.Config || '').toLowerCase().includes(s) || 
                  (r.Description || '').toLowerCase().includes(s);
         }
         return true;
      });
      const filteredReadiness = readinessItems.filter(r => {
         if (filterProject !== 'All' && r.Project !== filterProject) return false;
         if (filterStage !== 'All' && r.Stage !== filterStage) return false;
         if (filterStatus !== 'All' && r.Status !== filterStatus) return false;
         if (searchTerm) {
           const s = searchTerm.toLowerCase();
           return (r.Project || '').toLowerCase().includes(s) || 
                  (r.Item || '').toLowerCase().includes(s) || 
                  (r.Category || '').toLowerCase().includes(s);
         }
         return true;
      });
      const filteredDocuments = documents.filter(r => {
          if (filterProject !== 'All' && r.Project !== filterProject) return false;
          if (filterStage !== 'All' && r.Stage !== filterStage) return false;
          if (searchTerm) {
            const s = searchTerm.toLowerCase();
            return (r.Project || '').toLowerCase().includes(s) || 
                   (r['Document name'] || '').toLowerCase().includes(s);
          }
          return true;
       }).sort((a, b) => {
          const stageWeights = { 'All': 1, 'P2': 2, 'EVT': 3, 'DVT': 4, 'PVT': 5, 'MP': 6 };
          const wA = stageWeights[a.Stage] || 999;
          const wB = stageWeights[b.Stage] || 999;
          if (wA !== wB) return wA - wB;
          return (a['Document name'] || '').localeCompare(b['Document name'] || '');
       });

      const handleUpdate = async (type, item) => {
        let payload = {};
        const updateList = (list, setFunc, key) => {
          const exists = list.some(x => x.id === item.id);
          const n = exists ? list.map(x => x.id === item.id ? item : x) : [...list, item];
          setFunc(n);
          payload[key] = n;
        };

        if (type === 'record') updateList(records, setRecords, 'records');
        else if (type === 'sample') updateList(samples, setSamples, 'samples');
        else if (type === 'config') updateList(configsList, setConfigsList, 'configsList');
        else if (type === 'readiness') updateList(readinessItems, setReadinessItems, 'readinessItems');
        else if (type === 'document') updateList(documents, setDocuments, 'documents');

        await saveToExcel(payload);
        setEditingRecord(null); setEditingSample(null); setEditingConfig(null); setEditingReadiness(null); setEditingDocument(null);
      };

      const deleteItem = async (id, type) => {
        if (!window.confirm('Delete this item?')) return;
        let payload = {};
        if (type === 'records') { const n = records.filter(x => x.id !== id); setRecords(n); payload.records = n; }
        else if (type === 'samples') { const n = samples.filter(x => x.id !== id); setSamples(n); payload.samples = n; }
        else if (type === 'configsList') { const n = configsList.filter(x => x.id !== id); setConfigsList(n); payload.configsList = n; }
        else if (type === 'readinessItems') { const n = readinessItems.filter(x => x.id !== id); setReadinessItems(n); payload.readinessItems = n; }
        else if (type === 'documents') { const n = documents.filter(x => x.id !== id); setDocuments(n); payload.documents = n; }
        await saveToExcel(payload);
      };

      return (
        <div className="min-h-screen bg-[#f1f5f9] flex flex-col md:flex-row font-sans text-slate-900">
          <datalist id="stage-options">{STAGE_SUGGESTIONS.map(o => <option key={o} value={o} />)}</datalist>

          <nav className={`h-screen bg-slate-900 text-white flex flex-col shadow-2xl transition-all ${isSidebarOpen ? 'w-72' : 'w-20'}`}>
            <div className="p-6 flex items-center justify-between border-b border-slate-800">
              {isSidebarOpen ? (
                <div className="flex flex-col">
                  <div className="flex items-center gap-3 text-indigo-500 font-black text-xl">REL PORTAL</div>
                  <div className="flex items-center justify-between mt-1">
                    <div className="text-[10px] text-slate-500 font-medium tracking-widest uppercase">BY ESMOND</div>
                    <div className="text-[10px] bg-slate-800 text-indigo-400 px-2 py-0.5 rounded font-black">{APP_VERSION}</div>
                  </div>
                </div>
              ) : <Lock className="mx-auto text-indigo-500" />}
              <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1 hover:bg-slate-800 rounded">{isSidebarOpen ? <ChevronLeft /> : <ChevronRight />}</button>
            </div>
            <div className="flex-1 mt-6 px-4 space-y-1 overflow-y-auto">
              {[
                { id: 'records', icon: Table, zh: '實驗紀錄' },
                { id: 'tracking', icon: Box, zh: '樣本追蹤' },
                { id: 'config_recipes', icon: ClipboardList, zh: '配置規格' },
                { id: 'readiness', icon: CheckCircle, zh: '準備狀態' },
                { id: 'documents', icon: FileText, zh: '文件管理' },
                { id: 'stats', icon: PieChart, zh: '綜合統計' },
                { id: 'inventory', icon: Package, zh: '樣本庫存' },
                { id: 'tools', icon: Calculator, zh: '計算工具' },
                { id: 'instruction', icon: HelpCircle, zh: '使用說明' },
                { id: 'settings', icon: Settings, zh: '系統設定' }
              ].map(tab => {
                const Icon = tab.icon;
                return (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${activeTab === tab.id ? 'bg-indigo-600 shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}>
                    <Icon size={20}/>
                    {isSidebarOpen && <SidebarLabel en={tab.id.replace('_', ' ')} zh={tab.zh} />}
                  </button>
                )
              })}
            </div>
            <div className="p-4 border-t border-slate-800 flex flex-col gap-2">
               <div className={`text-xs ${dirHandle ? 'text-emerald-400' : 'text-rose-400'} flex items-center gap-2 truncate`}><FolderSearch size={14} /> {dirHandle ? dirHandle.name : 'No Folder Connected'}</div>
               <button onClick={() => setIsAdmin(!isAdmin)} className="w-full py-3 rounded-xl bg-slate-700 hover:bg-indigo-500 transition-colors text-xs font-black uppercase shadow-lg">{isAdmin ? 'Readonly Mode' : 'Admin Mode'}</button>
            </div>
          </nav>

          <main className="flex-1 flex flex-col bg-slate-50">
            <header className="px-8 py-6 bg-white border-b flex justify-between items-center">

                                         <text x="740" y="440" fill="#475569" fontSize="10" fontWeight="black" textAnchor="end">TIME DURATION (MIN)</text>

                                         {(() => {
                                           const maxT = Math.max(...profileSteps.map(s => s.temp), 100, 1) + 30;
                                           const totalTime = profileSteps.reduce((acc, s) => acc + (parseFloat(s.time)||0), 0) || 1;
                                           const scaleX = 700 / totalTime;
                                           const scaleY = 400 / maxT;
                                           
                                           let currentX = 60;
                                           let lastTemp = profileSteps[0]?.temp || 25;
                                           let d = `M 60 ${450 - lastTemp * scaleY}`;
                                           
                                           const points = [];
                                           profileSteps.forEach(s => {
                                              const t = parseFloat(s.time) || 0;
                                              const targetT = parseFloat(s.temp) || 0;
                                              currentX += t * scaleX;
                                              const y = 450 - targetT * scaleY;
                                              d += ` L ${currentX} ${y}`;
                                              points.push({x: currentX, y, temp: targetT, time: t});
                                           });

                                           return (
                                             <>
                                                <path d={d} fill="none" stroke="url(#lineGradWide)" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)" />
                                                {points.map((p, i) => (
                                                   <g key={i}>
                                                      <rect x={p.x-3} y={p.y-3} width="6" height="6" fill="#818cf8" transform={`rotate(45 ${p.x} ${p.y})`} />
                                                      <text x={p.x} y={p.y - 18} fill="#818cf8" fontSize="11" fontWeight="black" textAnchor="middle">{p.temp}℃</text>
                                                   </g>
                                                ))}
                                             </>
                                           );
                                         })()}
                                      </svg>
                                      <div className="absolute bottom-8 left-12 flex gap-8">
                                         <span className="flex items-center gap-3"><div className="w-4 h-4 rounded bg-indigo-500 shadow-[0_0_10px_rgba(79,70,229,0.8)]"></div><span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Program Path</span></span>

                                      </div>
                                   </div>
                                </div>
                             </div>
                           </div>
                         )}
                      </div>
                    )}

                                 <td className="bg-indigo-50 p-4 rounded-r-2xl border-y border-r text-center group-hover:bg-indigo-100 transition-colors font-black text-indigo-600 text-lg">
                                    {row.e}
                                 </td>
                              </tr>
                           ))}
                        </tbody>
                     </table>
                     <div className="mt-8 p-6 bg-amber-50 rounded-2xl border border-amber-100 flex gap-4 items-center">
                        <AlertCircle className="text-amber-500 shrink-0" size={24}/>
                        <p className="text-[10px] text-amber-900 font-medium leading-relaxed">
                           Note: Ea values are empirical. When specific failure data is available, please use the calculated value from experiment results for higher accuracy.
                        </p>
                     </div>
                  </div>
               </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered', reg))
          .catch(err => console.log('SW Failed', err));
      });
    }
  </script>
</body>
</html>
