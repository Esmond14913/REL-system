<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL PORTAL | HQA Lab Management</title>
  <meta name="description" content="REL PORTAL: A local-first, privacy-focused Laboratory Management System for HQA workflow optimization.">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <meta property="og:type" content="website">
  <meta property="og:title" content="REL PORTAL">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <!-- 使用更穩定的 Lucide 版本 -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.min.js"></script>
  <style>
    #compatibility-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; font-family: sans-serif; }
    #compatibility-overlay.active { display: flex; }
    .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 20; border-bottom: 2px solid #e2e8f0; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
  <script>
    window.react = window.React;
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW Reg failed', e));
      });
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="compatibility-overlay">
    <div style="font-size: 4rem; margin-bottom: 2rem;">🚀</div>
    <h2 style="font-weight: 900; font-size: 1.5rem; color: #1e293b;">Browser Not Supported / 環境不支援</h2>
    <p style="color: #64748b; margin: 1rem 0; max-width: 400px; line-height: 1.6;">
      REL Portal requires the <b>File System Access API</b> to manage local Excel files.<br/>
      Please use <b>Google Chrome</b> or <b>Microsoft Edge</b> on a Desktop and ensure the site is running under <b>HTTPS</b>.
    </p>
    <a href="https://www.google.com/chrome/" target="_blank" style="background: #4f46e5; color: #fff; padding: 0.75rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-weight: bold; margin-top: 1rem;">Download Chrome</a>
  </div>
  <div id="root"></div>
  <script>
    if (!window.showDirectoryPicker) {
      document.getElementById('compatibility-overlay').classList.add('active');
      document.getElementById('root').style.display = 'none';
    }
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // 徹底解決圖示加載失敗問題
    const Lucide = window.LucideReact || window.lucide || {};
    const { 
      PlusCircle, Trash2, Search, Lock, X, Pencil, Box, ClipboardList, 
      Truck, FolderOpen, Filter, Settings, PieChart, RefreshCw, 
      FolderSearch, AlertCircle, FolderLock, Package,
      CheckCircle, FileText, Layers, LayoutList, RotateCcw,
      ChevronLeft, ChevronRight
    } = Lucide;

    // 建立防錯組件，避免因圖示缺失而崩潰
    const Icon = ({ name: IconComp, size = 18, className = "" }) => {
      if (!IconComp) return <span className={className}>[Icon]</span>;
      return <IconComp size={size} className={className} />;
    };

    const DB_NAME = 'HQA_LocalDB';
    const STORE_NAME = 'handles';

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const saveHandleToDB = async (handle) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(handle, 'dir_handle');
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    const getHandleFromDB = async () => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get('dir_handle');
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    };

    async function verifyPermission(fileHandle, withWrite) {
      const opts = {};
      if (withWrite) { opts.mode = 'readwrite'; }
      try {
        if ((await fileHandle.queryPermission(opts)) === 'granted') { return true; }
        if ((await fileHandle.requestPermission(opts)) === 'granted') { return true; }
      } catch (e) { return false; }
      return false;
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const RESULTS = ['On-going', 'Pass', 'Fail', 'On-hold', 'N/A', 'Not Start'];

    const getStageStyle = (s) => {
      const m = { P2: 'bg-slate-200 text-slate-700 border-slate-300', EVT: 'bg-orange-100 text-orange-600 border-orange-200', DVT: 'bg-indigo-100 text-indigo-600 border-indigo-200', PVT: 'bg-purple-100 text-purple-600 border-purple-200', MP: 'bg-green-100 text-green-600 border-green-200', ALL: 'bg-blue-100 text-blue-600 border-blue-200' };
      return m[String(s).toUpperCase()] || 'bg-slate-100 border-slate-200';
    };

    const getResultStyle = (r) => {
      const m = { Pass: 'bg-emerald-500 text-white shadow-sm', Fail: 'bg-rose-500 text-white shadow-sm', 'On-going': 'bg-yellow-400 text-black shadow-sm', 'On-hold': 'bg-white text-slate-700 border-slate-200 shadow-sm', 'N/A': 'bg-black text-white shadow-sm', 'Not Start': 'bg-slate-100 text-slate-400 border-slate-200 shadow-sm' };
      return m[String(r)] || 'bg-slate-100 text-slate-400';
    };

    const SidebarLabel = ({ en, zh }) => (
      <span className="flex flex-col items-start justify-center leading-none text-left pointer-events-none">
        <span className="text-[9px] font-black uppercase tracking-tighter opacity-50 mb-1 block">{en}</span>
        <span className="text-[14px] font-bold tracking-tight whitespace-nowrap block">{zh}</span>
      </span>
    );

    const getDynamicOptions = (arr) => {
        return {
            projects: [...new Set(arr.map(a=>a.Project).filter(Boolean))],
            stages: [...new Set(arr.map(a=>a.Stage).filter(Boolean))],
            builds: [...new Set(arr.map(a=>a.Build).filter(Boolean))],
            configs: [...new Set(arr.map(a=>a.Config).filter(Boolean))],
            keepers: [...new Set(arr.map(a=>a.Keeper).filter(Boolean))]
        };
    };

    function App() {
      const [activeTab, setActiveTab] = useState('settings'); 
      const [records, setRecords] = useState([]);
      const [samples, setSamples] = useState([]);
      const [configsList, setConfigsList] = useState([]);
      const [readinessItems, setReadinessItems] = useState([]);
      const [documents, setDocuments] = useState([]);
      const [dirHandle, setDirHandle] = useState(null);
      const [message, setMessage] = useState('Welcome to REL Portal');
      const [retentionDays, setRetentionDays] = useState(() => parseInt(localStorage.getItem('retention_days') || '30'));
      const [isAdmin, setIsAdmin] = useState(false);
      const [inventoryGroupBy, setInventoryGroupBy] = useState('Keeper');
      const [inventorySubView, setInventorySubView] = useState('Detail');

      const [filterProject, setFilterProject] = useState('All');
      const [filterStage, setFilterStage] = useState('All');
      const [filterBuild, setFilterBuild] = useState('All');
      const [filterConfig, setFilterConfig] = useState('All');
      const [filterResult, setFilterResult] = useState('All');
      const [filterKeeper, setFilterKeeper] = useState('All');
      const [filterStatus, setFilterStatus] = useState('All');
      const [searchTerm, setSearchTerm] = useState('');

      const resetFilters = () => {
        setFilterProject('All'); setFilterStage('All'); setFilterBuild('All');
        setFilterConfig('All'); setFilterResult('All'); setFilterKeeper('All');
        setFilterStatus('All'); setSearchTerm('');
      };

      useEffect(() => {
        const initLocalFS = async () => {
          try {
            const storedHandle = await getHandleFromDB();
            if (storedHandle && await verifyPermission(storedHandle, true)) {
              setDirHandle(storedHandle);
              await loadAndCleanupExcelData(storedHandle, retentionDays);
              setActiveTab('records');
            }
          } catch (err) { }
        };
        initLocalFS();
      }, []);

      const loadAndCleanupExcelData = async (handle, rDays) => {
        try {
          if (!handle) return;
          setMessage('Scanning folder...');
          let latestFileHandle = null;
          let latestDateStr = '';
          for await (const entry of handle.values()) {
             if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_') && entry.name.endsWith('.xlsx')) {
                const dateStr = entry.name.replace('HQA_Master_', '').replace('.xlsx', '');
                if (dateStr > latestDateStr) { latestDateStr = dateStr; latestFileHandle = entry; }
             }
          }
          if (!latestFileHandle) {
             setMessage('No Project File.'); setRecords([]); setSamples([]); setConfigsList([]); return;
          }
          const file = await latestFileHandle.getFile();
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: 'array' });
          const getSheetData = (name) => {
             const sheet = wb.Sheets[name];
             if (!sheet) return [];
             return XLSX.utils.sheet_to_json(sheet, { raw: false }).map(row => ({ id: generateId(), ...row }));
          };
          setRecords(getSheetData('Records'));
          setSamples(getSheetData('Tracking'));
          setConfigsList(getSheetData('Config'));
          setReadinessItems(getSheetData('Readiness'));
          setDocuments(getSheetData('Documents'));
          setMessage('Ready.');
        } catch(err) { setMessage('Load Error.'); }
      };

      const saveToExcel = async (payload) => {
        if (!dirHandle) return;
        try {
          const today = dayjs().format('YYYYMMDD');
          const fileName = `HQA_Master_${today}.xlsx`;
          const prepare = (arr) => arr.map(r => { const {id, ...rest} = r; return rest; });
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.records || records)), 'Records');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.samples || samples)), 'Tracking');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.configsList || configsList)), 'Config');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.readinessItems || readinessItems)), 'Readiness');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prepare(payload.documents || documents)), 'Documents');
          const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
          const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(wbout);
          await writable.close();
          setMessage('Saved.');
        } catch(err) { setMessage('Save Failed.'); }
      };

      const connectDirectory = async () => {
        try {
          const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
          await saveHandleToDB(handle);
          setDirHandle(handle);
          await loadAndCleanupExcelData(handle, retentionDays);
          setActiveTab('records');
        } catch (err) { }
      };

      const deleteItem = (id, listKey) => {
         if (!window.confirm('Delete this item?')) return;
         const sets = { records, samples, configsList, readinessItems, documents };
         const setters = { records: setRecords, samples: setSamples, configsList: setConfigsList, readinessItems: setReadinessItems, documents: setDocuments };
         const newList = sets[listKey].filter(x => x.id !== id);
         setters[listKey](newList);
         saveToExcel({ [listKey]: newList });
      };

      const handleUpdate = (item, listKey, setter) => {
         const newList = [...(listKey === 'records' ? records : listKey === 'samples' ? samples : listKey === 'configsList' ? configsList : listKey === 'readinessItems' ? readinessItems : documents)];
         const idx = newList.findIndex(x => x.id === item.id);
         if (idx > -1) newList[idx] = item; else newList.unshift(item);
         setter(newList);
         saveToExcel({ [listKey]: newList });
      };

      const filteredRecords = records.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage) && (filterConfig==='All' || r.Config===filterConfig) && (filterResult==='All' || r.Result===filterResult) && (searchTerm==='' || JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase())));
      const filteredSamples = samples.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage) && (filterKeeper==='All' || r.Keeper===filterKeeper) && (filterConfig==='All' || r.Config===filterConfig) && (searchTerm==='' || JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase())));
      const filteredReadiness = readinessItems.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage) && (filterStatus==='All' || r.Status===filterStatus));
      const filteredDocuments = documents.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage));

      const [editingRecord, setEditingRecord] = useState(null);
      const [editingSample, setEditingSample] = useState(null);
      const [editingConfig, setEditingConfig] = useState(null);
      const [editingReadiness, setEditingReadiness] = useState(null);
      const [editingDocument, setEditingDocument] = useState(null);

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50 font-sans antialiased text-slate-900">
          <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm z-50">
            <div className="p-6 border-b border-slate-100 bg-white">
              <div className="flex items-center gap-3">
                 <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                   <Icon name={Layers} size={22} />
                 </div>
                 <div className="flex flex-col">
                    <span className="text-xs font-black text-slate-400 tracking-widest uppercase">Portal</span>
                    <span className="text-xl font-black text-indigo-900 leading-tight">REL PORTAL</span>
                 </div>
              </div>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
              {[
                { id: 'records', zh: '實驗記錄', en: 'RECORDS', icon: ClipboardList },
                { id: 'tracking', zh: '樣品追蹤', en: 'TRACKING', icon: Truck },
                { id: 'config', zh: '機台配置', en: 'CONFIG', icon: Box },
                { id: 'readiness', zh: '物料準備', en: 'READINESS', icon: Package },
                { id: 'documents', zh: '文件中心', en: 'DOCUMENTS', icon: FileText },
                { id: 'stats', zh: '綜合統計', en: 'STATS', icon: PieChart },
                { id: 'inventory', zh: '庫存儀表', en: 'INVENTORY', icon: LayoutList }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full group flex items-center gap-4 p-4 rounded-2xl transition-all duration-300 ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-[1.02]' : 'text-slate-500 hover:bg-slate-50 hover:text-indigo-600'}`}>
                  <Icon name={tab.icon} size={22} className={activeTab === tab.id ? 'text-white' : 'text-slate-400 group-hover:text-indigo-600'} />
                  <SidebarLabel en={tab.en} zh={tab.zh} />
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-slate-100 space-y-2">
               <button onClick={() => setIsAdmin(!isAdmin)} className="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-slate-50">
                 <Icon name={Lock} size={16} /> <span className="text-xs font-bold uppercase tracking-wider">{isAdmin ? 'Admin: Active' : 'Admin: Restricted'}</span>
               </button>
               <button onClick={() => setActiveTab('settings')} className="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-slate-50 font-bold uppercase tracking-wider text-xs">
                 <Icon name={Settings} size={16} /> Settings
               </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col relative bg-white overflow-hidden overflow-y-auto">
            <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-40">
              <div className="flex items-center gap-4">
                 <h2 className="text-lg font-black text-slate-800 uppercase tracking-tight">{activeTab}</h2>
                 <div className="h-4 w-[1px] bg-slate-200"></div>
                 <span className="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">{message}</span>
              </div>
              <div className="relative">
                 <Icon name={Search} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                 <input type="text" placeholder="Quick Search..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="bg-slate-100 border-none rounded-2xl py-2 pl-10 pr-4 text-sm w-64 focus:ring-2 focus:ring-indigo-500 transition-all" />
              </div>
            </header>

            <section className="flex-1 p-8 space-y-6">
                {!dirHandle && activeTab !== 'settings' && (
                  <div className="h-[70vh] flex flex-col items-center justify-center text-center space-y-6">
                    <div className="w-24 h-24 bg-indigo-50 rounded-[2.5rem] flex items-center justify-center text-indigo-600 shadow-inner">
                      <Icon name={FolderLock} size={40} />
                    </div>
                    <div className="space-y-2">
                       <h3 className="text-2xl font-black text-slate-800 uppercase">No Project Connected</h3>
                       <p className="text-slate-400 max-w-sm mx-auto font-medium">Please connect to a project folder in settings to start.</p>
                    </div>
                    <button onClick={() => setActiveTab('settings')} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-slate-800 transition-all flex items-center gap-2 uppercase tracking-wide">Go to Settings <Icon name={ChevronRight} size={18}/></button>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="max-w-4xl mx-auto space-y-8">
                     <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl shadow-slate-100/50 space-y-8">
                        <div className="flex flex-col gap-2">
                           <h2 className="text-3xl font-black text-slate-900 tracking-tight">System Configuration</h2>
                           <p className="text-slate-400 font-medium tracking-wide">Manage connections and data policies.</p>
                        </div>
                        <div className="grid gap-6">
                           <div className="p-6 bg-slate-50 rounded-3xl border border-slate-200 flex items-center justify-between">
                              <div className="flex gap-4 items-center">
                                 <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-indigo-600"><Icon name={FolderSearch} size={24}/></div>
                                 <div className="flex flex-col">
                                    <span className="text-sm font-black text-slate-800 uppercase tracking-wide">Project Connection / 專案連線</span>
                                    <span className="text-xs font-semibold text-slate-400">{dirHandle ? `Connected: ${dirHandle.name}` : 'No folder selected'}</span>
                                 </div>
                              </div>
                              <button onClick={connectDirectory} className="bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white px-6 py-2 rounded-xl font-bold transition-all shadow-sm">Connect Folder</button>
                           </div>
                        </div>
                     </div>
                  </div>
                )}

                {activeTab === 'records' && (
                  <div className="space-y-6">
                     <div className="bg-white p-6 rounded-3xl shadow-sm border flex flex-wrap items-center justify-between gap-4">
                        <div className="flex flex-wrap gap-4 items-center">
                           <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Projects</option>{getDynamicOptions(records).projects.map(p=><option key={p} value={p}>{p}</option>)}</select>
                           <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Stages</option>{getDynamicOptions(records).stages.map(p=><option key={p} value={p}>{p}</option>)}</select>
                           <button onClick={resetFilters} className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors"><Icon name={RotateCcw} size={20}/></button>
                        </div>
                        {isAdmin && <button onClick={() => setEditingRecord({ id: generateId() })} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-800 transition-colors uppercase text-sm tracking-wide"><Icon name={PlusCircle} size={18}/> New Record</button>}
                     </div>
                     <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <table className="w-full text-left border-separate border-spacing-0">
                          <thead className="bg-slate-50 border-b">
                             <tr className="text-[10px] uppercase text-slate-400 font-bold">
                                <th className="p-4 sticky top-0 left-0 bg-slate-100 z-30 border-b border-r border-slate-200">Project / 專案</th>
                                <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Stage / 階段</th>
                                <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Category / 類別</th>
                                <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Result / 結果</th>
                                <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Date / 日期</th>
                                {isAdmin && <th className="p-4 sticky top-0 right-0 bg-slate-100 z-30 border-b border-l border-slate-200 text-center">Action</th>}
                             </tr>
                          </thead>
                          <tbody className="divide-y text-[11px]">
                             {filteredRecords.map(r => (
                               <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                 <td className="p-4 font-bold sticky left-0 bg-white z-10 border-b border-r border-slate-100">{r.Project}</td>
                                 <td className="p-4 border-b border-slate-100"><span className={`px-2 py-1 rounded-lg border text-[10px] font-black uppercase ${getStageStyle(r.Stage)}`}>{r.Stage}</span></td>
                                 <td className="p-4 font-bold text-indigo-600 uppercase border-b border-slate-100">{r.Category}</td>
                                 <td className="p-4 border-b border-slate-100"><span className={`px-3 py-1 rounded-full font-bold uppercase tracking-widest text-[10px] ${getResultStyle(r.Result)}`}>{r.Result}</span></td>
                                 <td className="p-4 text-slate-400 border-b border-slate-100">{r.Date}</td>
                                 {isAdmin && <td className="p-4 text-center sticky right-0 bg-white z-10 border-b border-l border-slate-100">
                                   <div className="flex justify-center gap-2">
                                     <button onClick={()=>setEditingRecord(r)} className="p-1 hover:bg-slate-200 rounded text-indigo-600"><Icon name={Pencil} size={14}/></button>
                                     <button onClick={()=>deleteItem(r.id, 'records')} className="p-1 hover:bg-rose-100 rounded text-rose-500"><Icon name={Trash2} size={14}/></button>
                                   </div>
                                 </td>}
                               </tr>
                             ))}
                          </tbody>
                        </table>
                     </div>
                  </div>
                )}

                {activeTab === 'tracking' && (
                  <div className="space-y-6">
                     <div className="bg-white p-6 rounded-3xl shadow-sm border flex flex-wrap items-center justify-between gap-4">
                        <div className="flex flex-wrap gap-4 items-center">
                           <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Projects</option>{getDynamicOptions(samples).projects.map(p=><option key={p} value={p}>{p}</option>)}</select>
                           <button onClick={resetFilters} className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors"><Icon name={RotateCcw} size={20}/></button>
                        </div>
                        {isAdmin && <button onClick={() => setEditingSample({ id: generateId() })} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-800 transition-colors text-sm uppercase"><Icon name={PlusCircle} size={18}/> New Sample</button>}
                     </div>
                     <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <table className="w-full text-left border-separate border-spacing-0">
                          <thead className="bg-slate-50 border-b">
                             <tr className="text-[10px] uppercase text-slate-400 font-bold">
                               <th className="p-4 sticky top-0 left-0 bg-slate-100 z-30 border-b border-r border-slate-200">Sample ID / 樣品編號</th>
                               <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Project / 專案</th>
                               <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Stage / 階段</th>
                               <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Keeper / 位子</th>
                               <th className="p-4 sticky top-0 bg-slate-50 z-20 border-b border-slate-200">Units / 數量</th>
                               {isAdmin && <th className="p-4 sticky top-0 right-0 bg-slate-100 z-30 border-b border-l border-slate-200 text-center">Action</th>}
                             </tr>
                          </thead>
                          <tbody className="divide-y text-[11px]">
                             {filteredSamples.map(r => (
                               <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                 <td className="p-4 font-mono font-bold text-indigo-600 sticky left-0 bg-white z-10 border-b border-r border-slate-100">{r['Sample ID']}</td>
                                 <td className="p-4 font-bold border-b border-slate-100">{r.Project}</td>
                                 <td className="p-4 border-b border-slate-100"><span className={`px-2 py-1 rounded-lg border text-[10px] uppercase font-black ${getStageStyle(r.Stage)}`}>{r.Stage}</span></td>
                                 <td className="p-4 font-bold text-slate-700 border-b border-slate-100">{r.Keeper}</td>
                                 <td className="p-4 font-bold text-slate-700 border-b border-slate-100">{r.Units || '1'}</td>
                                 {isAdmin && <td className="p-4 text-center sticky right-0 bg-white z-10 border-b border-l border-slate-100">
                                   <div className="flex justify-center gap-2">
                                     <button onClick={()=>setEditingSample(r)} className="p-1 hover:bg-slate-200 rounded text-indigo-600"><Icon name={Pencil} size={14}/></button>
                                     <button onClick={()=>deleteItem(r.id, 'samples')} className="p-1 hover:bg-rose-100 rounded text-rose-500"><Icon name={Trash2} size={14}/></button>
                                   </div>
                                 </td>}
                               </tr>
                             ))}
                          </tbody>
                        </table>
                     </div>
                  </div>
                )}

                {activeTab === 'config' && (
                  <div className="space-y-6">
                     <div className="bg-white p-6 rounded-3xl shadow-sm border flex items-center justify-between">
                        <h3 className="font-black text-slate-800 uppercase tracking-widest text-sm underline decoration-indigo-200 underline-offset-4">Config Recipes / 機台配置清單</h3>
                        {isAdmin && <button onClick={() => setEditingConfig({ id: generateId() })} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-800 transition-colors uppercase text-sm"><Icon name={PlusCircle} size={18}/> New Config</button>}
                     </div>
                     <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <table className="w-full text-left border-separate border-spacing-0">
                          <thead className="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-bold">
                             <tr><th className="p-4 border-r">Stage</th><th className="p-4">Config Name</th><th className="p-4 w-[60%]">Description</th>{isAdmin && <th className="p-4 text-center">Action</th>}</tr>
                          </thead>
                          <tbody className="divide-y text-[11px]">
                             {configsList.map(r => (
                               <tr key={r.id} className="hover:bg-slate-50">
                                 <td className="p-4 font-bold border-r"><span className={`px-2 py-1 rounded-lg border text-[10px] ${getStageStyle(r.Stage)}`}>{r.Stage}</span></td>
                                 <td className="p-4 font-mono font-bold text-indigo-600">{r.Config}</td>
                                 <td className="p-4 text-slate-500 leading-relaxed">{r.Description}</td>
                                 {isAdmin && <td className="p-4 text-center">
                                   <button onClick={()=>setEditingConfig(r)} className="p-1 text-indigo-600"><Icon name={Pencil} size={14}/></button>
                                 </td>}
                               </tr>
                             ))}
                          </tbody>
                        </table>
                     </div>
                  </div>
                )}

                {activeTab === 'stats' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                     <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-100/30 space-y-8">
                        <div className="flex items-center justify-between">
                            <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">Global Progress / 總體進度統計</h3>
                            <Icon name={PieChart} className="text-indigo-600" size={24}/>
                        </div>
                        <div className="p-10 bg-slate-50 rounded-[2rem] text-center space-y-2 border border-slate-100 shadow-inner">
                           <span className="text-6xl font-black text-indigo-900 tracking-tighter">{records.length}</span>
                           <span className="block text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">Total Test Records / 總測試件數</span>
                        </div>
                        <div className="space-y-6">
                           {(() => {
                              const totalForCalc = records.filter(r => r.Result !== 'N/A').length;
                              return RESULTS.map(status => {
                                 const count = records.filter(r => r.Result === status).length;
                                 if (count === 0) return null;
                                 const isNA = status === 'N/A';
                                 const pct = (!isNA && totalForCalc > 0) ? ((count / totalForCalc) * 100).toFixed(1) : 0;
                                 const color = status === 'Pass' ? 'emerald' : status === 'Fail' ? 'rose' : status === 'On-going' ? 'yellow' : 'slate';
                                 return (
                                    <div key={status} className="space-y-2">
                                       <div className="flex justify-between text-[11px] font-black uppercase text-slate-500 tracking-wider">
                                          <span>{status}</span>
                                          <span className={`text-${color}-600 text-lg`}>{count} {isNA ? '(-%)' : `(${pct}%)`}</span>
                                       </div>
                                       <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden">
                                          <div style={{ width: `${isNA ? 0 : pct}%` }} className={`bg-${color}-500 h-full rounded-full transition-all duration-1000 shadow-sm`} />
                                       </div>
                                    </div>
                                 );
                              }).filter(Boolean);
                           })()}
                        </div>
                     </div>
                  </div>
                )}

                {activeTab === 'inventory' && (
                  <div className="space-y-8">
                    <div className="flex justify-between items-center bg-white p-2 rounded-2xl shadow-sm border">
                       <div className="flex items-center gap-2">
                          <button onClick={() => setInventoryGroupBy('Keeper')} className={`px-5 py-1.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${inventoryGroupBy === 'Keeper' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-indigo-600'}`}>By Keeper / 按保管人</button>
                          <button onClick={() => setInventoryGroupBy('Stage')} className={`px-5 py-1.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${inventoryGroupBy === 'Stage' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-indigo-600'}`}>By Stage / 按階段</button>
                       </div>
                       <div className="flex items-center gap-2">
                          <button onClick={() => setInventorySubView('Detail')} className={`px-5 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${inventorySubView === 'Detail' ? 'bg-slate-100 text-indigo-600' : 'text-slate-400'}`}>Detail</button>
                          <button onClick={() => setInventorySubView('Config')} className={`px-5 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${inventorySubView === 'Config' ? 'bg-slate-100 text-indigo-600' : 'text-slate-400'}`}>By Config</button>
                       </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                       {(() => {
                          const groups = {};
                          samples.forEach(s => {
                             const key = inventoryGroupBy === 'Keeper' ? (s.Keeper || 'Unknown') : (s.Stage || 'N/A');
                             if (!groups[key]) groups[key] = [];
                             groups[key].push(s);
                          });
                          return Object.entries(groups).map(([groupName, items]) => {
                             const totalUnits = items.reduce((sum, item) => sum + parseInt(item.Units || '1'), 0);
                             const subCounts = items.reduce((acc, curr) => {
                                const key = inventorySubView === 'Config' ? (curr.Config || 'No Config') : (inventoryGroupBy === 'Keeper' ? curr.Project : curr.Keeper);
                                acc[key] = (acc[key] || 0) + parseInt(curr.Units || '1');
                                return acc;
                             }, {});
                             return (
                               <div key={groupName} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-100/20 hover:border-indigo-200 transition-all group flex flex-col h-full hover:shadow-indigo-100/50">
                                  <div className="flex justify-between items-start mb-6">
                                     <div className="space-y-1"><h4 className="text-sm font-black text-indigo-900 uppercase break-words leading-tight">{groupName}</h4><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Inventory</p></div>
                                     <div className="bg-indigo-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center font-black text-lg shadow-lg">{totalUnits}</div>
                                  </div>
                                  <div className="flex-1 space-y-2">
                                     {Object.entries(subCounts).map(([dimension, count]) => (
                                       <div key={dimension} className="flex justify-between items-center p-3 rounded-2xl bg-slate-50 text-[10px] font-black uppercase">
                                          <span className="text-slate-600 truncate mr-2">{dimension}</span>
                                          <span className="text-indigo-500 bg-white px-2 py-0.5 rounded-lg border">{count}</span>
                                       </div>
                                     ))}
                                  </div>
                               </div>
                             );
                          });
                       })()}
                    </div>
                  </div>
                )}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
