<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL PORTAL | HQA Lab Management</title>
  <meta name="description" content="REL PORTAL: A local-first Laboratory Management System.">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <style>
    #compatibility-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; font-family: sans-serif; }
    #compatibility-overlay.active { display: flex; }
    .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 20; border-bottom: 2px solid #e2e8f0; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="compatibility-overlay">
    <div style="font-size: 4rem; margin-bottom: 2rem;">🚀</div>
    <h2 style="font-weight: 900; font-size: 1.5rem; color: #1e293b;">Browser Not Supported / 環境不支援</h2>
    <p style="color: #64748b; margin: 1rem 0; max-width: 400px; line-height: 1.6;">Please use Chrome/Edge on Desktop.</p>
  </div>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // 零依賴 SVG 圖示系統
    const Icons = {
      Records: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
      Tracking: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 17h.01"/><path d="M3.4 12.1a2 2 0 0 1 1-2.9L13 5.4a2 2 0 0 1 2.9 1L19.3 16a2 2 0 0 1-1 2.9L5 22.3a2 2 0 0 1-2.9-1L.5 17.5a2 2 0 0 1 1-2.9L3.4 12.1Z"/><path d="m8 10 3 3"/><path d="m14 7 3 3"/></svg>,
      Config: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
      Readiness: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 16h.01"/><path d="M3.4 7.9a2 2 0 0 0-1 2.9l3.4 6a2 2 0 0 0 2.9 1l8.6-4.9a2 2 0 0 0 1-2.9l-3.4-6a2 2 0 0 0-2.9-1L3.4 7.9Z"/><path d="m5 11 3 3"/><path d="m11 8 3 3"/></svg>,
      Docs: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
      Stats: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
      Inventory: ({ size = 22, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Settings: ({ size = 16, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Search: ({ size = 16, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Plus: ({ size = 18, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: ({ size = 14, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Edit: ({ size = 14, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      ChevronRight: ({ size = 18, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>,
      Rotate: ({ size = 20, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><polyline points="21 3 21 8 16 8"/></svg>,
      Lock: ({ size = 16, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      X: ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    };

    const DB_NAME = 'HQA_LocalDB';
    const STORE_NAME = 'handles';

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const saveHandleToDB = async (handle) => {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(handle, 'dir_handle');
      return new Promise((res) => tx.oncomplete = res);
    };

    const getHandleFromDB = async () => {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get('dir_handle');
      return new Promise((res) => req.onsuccess = () => res(req.result));
    };

    async function verifyPermission(fileHandle, withWrite) {
      const opts = { mode: withWrite ? 'readwrite' : 'read' };
      if ((await fileHandle.queryPermission(opts)) === 'granted') return true;
      try { if ((await fileHandle.requestPermission(opts)) === 'granted') return true; } catch (e) {}
      return false;
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const RESULTS = ['On-going', 'Pass', 'Fail', 'On-hold', 'N/A', 'Not Start'];

    const getStageStyle = (s) => {
      const m = { P2: 'bg-slate-200 text-slate-700', EVT: 'bg-orange-100 text-orange-600', DVT: 'bg-indigo-100 text-indigo-600', PVT: 'bg-purple-100 text-purple-600', MP: 'bg-green-100 text-green-600' };
      return m[String(s).toUpperCase()] || 'bg-slate-100 text-slate-400';
    };

    const getResultStyle = (r) => {
      const m = { Pass: 'bg-emerald-500 text-white', Fail: 'bg-rose-500 text-white', 'On-going': 'bg-yellow-400 text-black', 'On-hold': 'bg-white text-slate-700 border border-slate-200', 'N/A': 'bg-black text-white', 'Not Start': 'bg-slate-100 text-slate-400' };
      return m[String(r)] || 'bg-slate-100 text-slate-400';
    };

    const SidebarLabel = ({ en, zh }) => (
      <span className="flex flex-col items-start justify-center leading-none text-left pointer-events-none">
        <span className="text-[9px] font-black uppercase tracking-tighter opacity-50 mb-1 block">{en}</span>
        <span className="text-[14px] font-bold tracking-tight whitespace-nowrap block">{zh}</span>
      </span>
    );

    function App() {
      const [activeTab, setActiveTab] = useState('settings'); 
      const [records, setRecords] = useState([]);
      const [samples, setSamples] = useState([]);
      const [configsList, setConfigsList] = useState([]);
      const [readinessItems, setReadinessItems] = useState([]);
      const [documents, setDocuments] = useState([]);
      const [dirHandle, setDirHandle] = useState(null);
      const [message, setMessage] = useState('Welcome to REL Portal');
      const [isAdmin, setIsAdmin] = useState(false);
      const [inventoryGroupBy, setInventoryGroupBy] = useState('Keeper');
      const [inventorySubView, setInventorySubView] = useState('Detail');
      const [searchTerm, setSearchTerm] = useState('');

      const [filterProject, setFilterProject] = useState('All');
      const [filterStage, setFilterStage] = useState('All');
      const [filterConfig, setFilterConfig] = useState('All');
      const [filterResult, setFilterResult] = useState('All');
      const [filterKeeper, setFilterKeeper] = useState('All');

      useEffect(() => {
        const init = async () => {
          const stored = await getHandleFromDB();
          if (stored && await verifyPermission(stored, true)) {
            setDirHandle(stored); await loadData(stored); setActiveTab('records');
          }
        };
        init();
      }, []);

      const loadData = async (handle) => {
        try {
          setMessage('Scanning...');
          let latest = null; let latestDate = '';
          for await (const entry of handle.values()) {
            if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_')) {
              const d = entry.name.match(/\d{8}/)?.[0] || '';
              if (d > latestDate) { latestDate = d; latest = entry; }
            }
          }
          if (!latest) { setMessage('No project file.'); return; }
          const file = await latest.getFile();
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: 'array' });
          const getS = (n) => (XLSX.utils.sheet_to_json(wb.Sheets[n]||{})).map(r => ({id: generateId(), ...r}));
          setRecords(getS('Records')); setSamples(getS('Tracking')); setConfigsList(getS('Config'));
          setReadinessItems(getS('Readiness')); setDocuments(getS('Documents'));
          setMessage('System Ready.');
        } catch (e) { setMessage('Load failed.'); }
      };

      const saveToExcel = async (payload = {}) => {
        if (!dirHandle) return;
        try {
          setMessage('Saving...');
          const today = dayjs().format('YYYYMMDD');
          const fileName = `HQA_Master_${today}.xlsx`;
          const wb = XLSX.utils.book_new();
          const p = (arr) => arr.map(x => { const {id, ...rest} = x; return rest; });
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.records || records)), 'Records');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.samples || samples)), 'Tracking');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.configsList || configsList)), 'Config');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.readinessItems || readinessItems)), 'Readiness');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.documents || documents)), 'Documents');
          const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
          const handle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await handle.createWritable();
          await writable.write(wbout); await writable.close();
          setMessage('Saved.');
        } catch (e) { setMessage('Save Error.'); }
      };

      const connectDirectory = async () => {
        try {
          const h = await window.showDirectoryPicker({ mode: 'readwrite' });
          await saveHandleToDB(h); setDirHandle(h); await loadData(h); setActiveTab('records');
        } catch (e) {}
      };

      const [editingRecord, setEditingRecord] = useState(null);
      const [editingSample, setEditingSample] = useState(null);
      const [editingConfig, setEditingConfig] = useState(null);
      const [editingReadiness, setEditingReadiness] = useState(null);
      const [editingDocument, setEditingDocument] = useState(null);

      const updateItem = (item, listName, setter) => {
        const list = listName==='records'?records:listName==='samples'?samples:listName==='configsList'?configsList:listName==='readinessItems'?readinessItems:documents;
        const newList = [...list];
        const idx = newList.findIndex(x => x.id === item.id);
        if (idx > -1) newList[idx] = item; else newList.unshift(item);
        setter(newList); saveToExcel({ [listName]: newList });
      };

      const deleteItem = (id, listName, setter) => {
        if (!confirm('Delete this item?')) return;
        const list = listName==='records'?records:listName==='samples'?samples:listName==='configsList'?configsList:listName==='readinessItems'?readinessItems:documents;
        const newList = list.filter(x => x.id !== id);
        setter(newList); saveToExcel({ [listName]: newList });
      };

      const filteredRecords = records.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage) && (filterConfig==='All' || r.Config===filterConfig) && (filterResult==='All' || r.Result===filterResult) && (searchTerm==='' || JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase())));
      const filteredSamples = samples.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage) && (filterKeeper==='All' || r.Keeper===filterKeeper) && (searchTerm==='' || JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase())));

      const projects = [...new Set(records.map(r=>r.Project).filter(Boolean))];
      const stages = [...new Set(records.map(r=>r.Stage).filter(Boolean))];

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50 font-sans antialiased text-slate-900 border-indigo-100">
          <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm z-50">
            <div className="p-6 border-b border-slate-100 bg-white">
              <div className="flex items-center gap-3">
                 <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><Icons.Records /></div>
                 <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 tracking-widest uppercase">Portal</span><span className="text-lg font-black text-indigo-900 leading-tight">REL PORTAL</span></div>
              </div>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
              {[
                { id: 'records', zh: '實驗記錄', en: 'RECORDS', icon: Icons.Records },
                { id: 'tracking', zh: '樣品追蹤', en: 'TRACKING', icon: Icons.Tracking },
                { id: 'config', zh: '機台配置', en: 'CONFIG', icon: Icons.Config },
                { id: 'readiness', zh: '物料準備', en: 'READINESS', icon: Icons.Readiness },
                { id: 'documents', zh: '文件中心', en: 'DOCUMENTS', icon: Icons.Docs },
                { id: 'stats', zh: '綜合統計', en: 'STATS', icon: Icons.Stats },
                { id: 'inventory', zh: '庫存儀表', en: 'INVENTORY', icon: Icons.Inventory }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full group flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-xl scale-[1.02]' : 'text-slate-500 hover:bg-slate-50 hover:text-indigo-600'}`}>
                  <tab.icon className={activeTab === tab.id ? 'text-white' : 'text-slate-400 group-hover:text-indigo-600'} />
                  <SidebarLabel en={tab.en} zh={tab.zh} />
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-slate-100 space-y-2">
               <button onClick={() => setIsAdmin(!isAdmin)} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${isAdmin ? 'bg-indigo-50 text-indigo-700' : 'text-slate-400 hover:bg-slate-50'}`}><Icons.Lock size={16}/> <span className="text-xs font-bold uppercase tracking-wider">{isAdmin ? 'Admin View' : 'User View'}</span></button>
               <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${activeTab === 'settings' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-400 hover:bg-slate-50'}`}><Icons.Settings size={16}/> <span className="text-xs font-bold uppercase tracking-wider">Settings</span></button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col bg-white overflow-hidden overflow-y-auto">
            <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-40">
              <div className="flex items-center gap-4">
                 <h2 className="text-lg font-black text-slate-800 uppercase tracking-tight">{activeTab}</h2>
                 <div className="h-4 w-[1px] bg-slate-200"></div>
                 <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">{message}</span>
              </div>
              <div className="relative">
                 <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                 <input type="text" placeholder="Search..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="bg-slate-100 border-none rounded-2xl py-2 pl-10 pr-4 text-sm w-64 focus:ring-2 focus:ring-indigo-500 transition-all font-medium" />
              </div>
            </header>

            <section className="flex-1 p-8 space-y-6">
              {!dirHandle && activeTab !== 'settings' && (
                <div className="h-[60vh] flex flex-col items-center justify-center text-center space-y-6">
                  <div className="w-24 h-24 bg-indigo-50 rounded-[2.5rem] flex items-center justify-center text-indigo-600 shadow-inner"><Icons.Config size={40} /></div>
                  <div className="space-y-1"><h3 className="text-2xl font-black text-slate-800 uppercase">No Workspace Connected</h3><p className="text-slate-400 text-sm max-w-sm mx-auto font-medium">Connect a local project folder to start.</p></div>
                  <button onClick={() => setActiveTab('settings')} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl hover:bg-slate-800 transition-all uppercase text-sm tracking-wide">Open Settings</button>
                </div>
              )}

              {activeTab === 'settings' && (
                <div className="max-w-4xl mx-auto py-10">
                   <div className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-10 animate-in fade-in duration-700">
                      <div><h2 className="text-3xl font-black text-slate-900 tracking-tight">System Configuration</h2><p className="text-slate-400 font-bold mt-1 uppercase text-xs tracking-widest">Local-first Workspace Management</p></div>
                      <div className="p-8 bg-slate-50 rounded-3xl border border-slate-200 flex items-center justify-between">
                        <div className="flex gap-5 items-center">
                          <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm text-indigo-600"><Icons.Records /></div>
                          <div className="flex flex-col">
                            <span className="text-base font-black text-slate-800">Workspace / 工作目錄</span>
                            <span className="text-sm font-semibold text-slate-400 tracking-tight">{dirHandle ? `Linked: ${dirHandle.name}` : 'Not connected'}</span>
                          </div>
                        </div>
                        <button onClick={connectDirectory} className="bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white px-8 py-2.5 rounded-xl font-black transition-all shadow-indigo-100 shadow-lg uppercase text-xs tracking-widest">Connect Folder</button>
                      </div>
                   </div>
                </div>
              )}

              {activeTab === 'records' && dirHandle && (
                <div className="animate-in fade-in duration-500 space-y-6">
                   <div className="bg-white p-6 rounded-3xl shadow-sm border flex flex-wrap items-center justify-between gap-4">
                      <div className="flex flex-wrap gap-4 items-center">
                         <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">Projects</option>{projects.map(p=><option key={p} value={p}>{p}</option>)}</select>
                         <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">Stages</option>{stages.map(p=><option key={p} value={p}>{p}</option>)}</select>
                         <button onClick={()=>{setFilterProject('All');setFilterStage('All');setSearchTerm('');}} className="p-2 text-indigo-600 bg-indigo-50 rounded-xl"><Icons.Rotate size={18}/></button>
                      </div>
                      {isAdmin && <button onClick={() => setEditingRecord({ id: generateId(), Result: 'Pass' })} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 uppercase text-xs tracking-wide"><Icons.Plus /> New Record</button>}
                   </div>
                   <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                      <table className="w-full text-left border-separate border-spacing-0">
                        <thead className="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-black">
                           <tr>
                              <th className="p-4 border-r sticky left-0 bg-slate-100">Project / 專案</th>
                              <th className="p-4 border-b">Stage / 階段</th>
                              <th className="p-4 border-b">Category / 類別</th>
                              <th className="p-4 border-b">Config / 配置</th>
                              <th className="p-4 border-b">Result / 結果</th>
                              <th className="p-4 border-b">Date / 日期</th>
                              {isAdmin && <th className="p-4 border-b text-center">Action</th>}
                           </tr>
                        </thead>
                        <tbody className="divide-y text-[11px]">
                           {filteredRecords.map(r => (
                             <tr key={r.id} className="hover:bg-slate-50">
                               <td className="p-4 font-bold border-r sticky left-0 bg-white">{r.Project}</td>
                               <td className="p-4"><span className={`px-2 py-1 rounded-lg font-black uppercase text-[9px] ${getStageStyle(r.Stage)}`}>{r.Stage}</span></td>
                               <td className="p-4 font-bold text-indigo-900 group">{r.Category}</td>
                               <td className="p-4 font-mono text-slate-500">{r.Config || '-'}</td>
                               <td className="p-4"><span className={`px-3 py-1 rounded-full font-black uppercase tracking-widest text-[9px] ${getResultStyle(r.Result)}`}>{r.Result}</span></td>
                               <td className="p-4 text-slate-400">{String(r.Date).split('T')[0]}</td>
                               {isAdmin && <td className="p-4 text-center">
                                 <div className="flex justify-center gap-2">
                                   <button onClick={()=>setEditingRecord(r)} className="p-1 text-indigo-600"><Icons.Edit /></button>
                                   <button onClick={()=>deleteItem(r.id, 'records', setRecords)} className="p-1 text-rose-500"><Icons.Trash /></button>
                                 </div>
                               </td>}
                             </tr>
                           ))}
                        </tbody>
                      </table>
                   </div>
                </div>
              )}

              {activeTab === 'tracking' && dirHandle && (
                <div className="animate-in fade-in duration-500 space-y-6">
                   <div className="bg-white p-6 rounded-3xl shadow-sm border flex flex-wrap items-center justify-between gap-4">
                      <div className="flex flex-wrap gap-4 items-center">
                         <select value={filterKeeper} onChange={e=>setFilterKeeper(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Keepers / 所有人</option>{[...new Set(samples.map(s=>s.Keeper).filter(Boolean))].map(k=><option key={k} value={k}>{k}</option>)}</select>
                      </div>
                      {isAdmin && <button onClick={() => setEditingSample({ id: generateId() })} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 uppercase text-xs tracking-wide"><Icons.Plus /> New Sample</button>}
                   </div>
                   <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                      <table className="w-full text-left border-separate border-spacing-0">
                        <thead className="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-black">
                           <tr>
                              <th className="p-4 border-r sticky left-0 bg-slate-100">Sample ID / 樣品編號</th>
                              <th className="p-4 border-b">Project</th>
                              <th className="p-4 border-b">Stage</th>
                              <th className="p-4 border-b">Build</th>
                              <th className="p-4 border-b font-mono">Config</th>
                              <th className="p-4 border-b">Keeper / 位子</th>
                              <th className="p-4 border-b text-center">Units</th>
                              {isAdmin && <th className="p-4 border-b text-center">Action</th>}
                           </tr>
                        </thead>
                        <tbody className="divide-y text-[11px]">
                           {filteredSamples.map(r => (
                             <tr key={r.id} className="hover:bg-slate-50">
                               <td className="p-4 font-mono font-bold text-indigo-600 border-r sticky left-0 bg-white">{r['Sample ID']}</td>
                               <td className="p-4 font-bold">{r.Project}</td>
                               <td className="p-4"><span className={`px-2 py-0.5 rounded-lg border text-[9px] font-black uppercase ${getStageStyle(r.Stage)}`}>{r.Stage}</span></td>
                               <td className="p-4 font-bold uppercase">{r.Build}</td>
                               <td className="p-4 font-mono text-slate-400">{r.Config || '-'}</td>
                               <td className="p-4 font-bold text-slate-700">{r.Keeper}</td>
                               <td className="p-4 text-center font-black">{r.Units || 1}</td>
                               {isAdmin && <td className="p-4 text-center">
                                 <div className="flex justify-center gap-2">
                                   <button onClick={()=>setEditingSample(r)} className="p-1 text-indigo-600"><Icons.Edit /></button>
                                   <button onClick={()=>deleteItem(r.id, 'samples', setSamples)} className="p-1 text-rose-500"><Icons.Trash /></button>
                                 </div>
                               </td>}
                             </tr>
                           ))}
                        </tbody>
                      </table>
                   </div>
                </div>
              )}

              {activeTab === 'inventory' && dirHandle && (
                <div className="animate-in fade-in duration-500 space-y-6">
                   <div className="flex justify-between items-center bg-white p-2 rounded-2xl border shadow-sm">
                      <div className="flex gap-2">
                         <button onClick={()=>setInventoryGroupBy('Keeper')} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${inventoryGroupBy==='Keeper'?'bg-indigo-600 text-white shadow-md':'text-slate-400 hover:text-indigo-600'}`}>By Keeper / 按保管人</button>
                         <button onClick={()=>setInventoryGroupBy('Stage')} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${inventoryGroupBy==='Stage'?'bg-indigo-600 text-white shadow-md':'text-slate-400 hover:text-indigo-600'}`}>By Stage / 按階段</button>
                      </div>
                      <div className="flex gap-2">
                         <button onClick={()=>setInventorySubView('Detail')} className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${inventorySubView==='Detail'?'bg-indigo-50 text-indigo-600':'text-slate-400'}`}>Default View</button>
                         <button onClick={()=>setInventorySubView('Config')} className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${inventorySubView==='Config'?'bg-indigo-50 text-indigo-600':'text-slate-400'}`}>By Config</button>
                      </div>
                   </div>
                   <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                      {(() => {
                        const groups = {};
                        samples.forEach(s => {
                           const k = inventoryGroupBy==='Keeper' ? (s.Keeper||'Unknown') : (s.Stage||'N/A');
                           if (!groups[k]) groups[k] = [];
                           groups[k].push(s);
                        });
                        return Object.entries(groups).map(([name, items]) => {
                           const total = items.reduce((s, i) => s + parseInt(i.Units||1), 0);
                           const sub = items.reduce((a, c) => {
                             const sk = inventorySubView==='Config' ? (c.Config||'Empty Config') : (inventoryGroupBy==='Keeper'?c.Project:c.Keeper);
                             a[sk] = (a[sk]||0) + parseInt(c.Units||1); return a;
                           }, {});
                           return (
                             <div key={name} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-4 hover:border-indigo-300 transition-colors flex flex-col h-full group">
                                <div className="flex justify-between items-start">
                                   <div className="space-y-1"><h4 className="text-sm font-black text-indigo-900 uppercase break-words leading-tight">{name}</h4><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Status Summary</p></div>
                                   <div className="bg-indigo-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center font-black text-lg group-hover:scale-110 transition-transform shadow-lg">{total}</div>
                                </div>
                                <div className="flex-1 space-y-2">
                                   {Object.entries(sub).map(([d, c]) => (
                                     <div key={d} className="flex justify-between items-center p-3 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-white transition-colors">
                                        <span className="text-[10px] font-black text-slate-600 uppercase truncate mr-2">{d}</span>
                                        <span className="text-[10px] font-black text-indigo-600 bg-white px-2 py-0.5 rounded-lg border border-indigo-100">{c}</span>
                                     </div>
                                   ))}
                                </div>
                             </div>
                           );
                        });
                      })()}
                   </div>
                </div>
              )}

              {activeTab === 'stats' && dirHandle && (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in duration-500 pb-20">
                   <div className="bg-white p-8 rounded-[3rem] border shadow-xl space-y-8">
                      <div className="flex items-center justify-between"><h3 className="text-sm font-black text-slate-400 uppercase tracking-widest leading-none">Overall Progress / 總體測試進度</h3><Icons.Stats className="text-indigo-600" /></div>
                      <div className="p-10 bg-slate-50 rounded-[2rem] text-center border shadow-inner"><span className="text-6xl font-black text-indigo-900 tracking-tighter">{records.length}</span><span className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">Total Units / 總測試件數</span></div>
                      <div className="space-y-6">
                         {(() => {
                           const totalForCalc = records.filter(r => r.Result !== 'N/A').length;
                           return RESULTS.map(status => {
                             const count = records.filter(r => r.Result === status).length;
                             if (count === 0) return null;
                             const isNA = status === 'N/A';
                             const pct = (!isNA && totalForCalc > 0) ? ((count / totalForCalc) * 100).toFixed(1) : 0;
                             const color = status==='Pass'?'emerald':status==='Fail'?'rose':status==='On-going'?'yellow':'slate';
                             return (
                               <div key={status} className="space-y-2">
                                  <div className="flex justify-between text-[11px] font-black uppercase text-slate-500"><span>{status}</span><span className={`text-${color}-600 text-lg`}>{count} {isNA ? '(Exclude)' : `(${pct}%)`}</span></div>
                                  <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner"><div style={{ width: `${isNA?0:pct}%` }} className={`bg-${color}-500 h-full rounded-full transition-all duration-1000`} /></div>
                               </div>
                             );
                           });
                         })()}
                      </div>
                   </div>
                </div>
              )}
            </section>
          </main>

          {/* 所有的 Modal 恢復 */}
          {editingRecord && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10 relative animate-in zoom-in-95 duration-300">
                 <button onClick={()=>setEditingRecord(null)} className="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full text-slate-400"><Icons.X size={20}/></button>
                 <h3 className="text-2xl font-black text-slate-900 mb-8 uppercase tracking-tight">Record Editor</h3>
                 <form onSubmit={(e)=>{e.preventDefault(); updateItem(editingRecord, 'records', setRecords); setEditingRecord(null);}} className="grid grid-cols-2 gap-6">
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Project</label><input required value={editingRecord.Project||''} onChange={e=>setEditingRecord({...editingRecord, Project:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Stage</label><input required value={editingRecord.Stage||''} onChange={e=>setEditingRecord({...editingRecord, Stage:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="col-span-2 space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Category</label><input required value={editingRecord.Category||''} onChange={e=>setEditingRecord({...editingRecord, Category:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Config</label><input value={editingRecord.Config||''} onChange={e=>setEditingRecord({...editingRecord, Config:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-mono text-sm" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Result</label><select value={editingRecord.Result||'Pass'} onChange={e=>setEditingRecord({...editingRecord, Result:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold">{RESULTS.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
                    <div className="col-span-2 pt-6"><button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-slate-900 text-white rounded-2xl font-black shadow-lg transition-colors uppercase tracking-widest">Save Record / 儲存</button></div>
                 </form>
              </div>
            </div>
          )}

          {editingSample && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10 relative animate-in zoom-in-95 duration-300">
                 <button onClick={()=>setEditingSample(null)} className="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full text-slate-400"><Icons.X size={20}/></button>
                 <h3 className="text-2xl font-black text-slate-900 mb-8 uppercase tracking-tight">Sample Editor</h3>
                 <form onSubmit={(e)=>{e.preventDefault(); updateItem(editingSample, 'samples', setSamples); setEditingSample(null);}} className="grid grid-cols-2 gap-6">
                    <div className="col-span-2 space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Sample ID</label><input required value={editingSample['Sample ID']||''} onChange={e=>setEditingSample({...editingSample, 'Sample ID':e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-mono font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Project</label><input required value={editingSample.Project||''} onChange={e=>setEditingSample({...editingSample, Project:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Stage</label><input required value={editingSample.Stage||''} onChange={e=>setEditingSample({...editingSample, Stage:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Build</label><input value={editingSample.Build||''} onChange={e=>setEditingSample({...editingSample, Build:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Keeper</label><input required value={editingSample.Keeper||''} onChange={e=>setEditingSample({...editingSample, Keeper:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl font-bold" /></div>
                    <div className="col-span-2 pt-6"><button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-slate-900 text-white rounded-2xl font-black shadow-lg transition-colors uppercase tracking-widest">Update Tracking / 更新追蹤</button></div>
                 </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
