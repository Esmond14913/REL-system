<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL PORTAL | HQA Lab Management</title>
  <meta name="description" content="REL PORTAL: A local-first, privacy-focused Laboratory Management System for HQA workflow optimization.">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <meta property="og:type" content="website">
  <meta property="og:title" content="REL PORTAL">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <!-- 只加載核心 Lucide 庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    #compatibility-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; font-family: sans-serif; }
    #compatibility-overlay.active { display: flex; }
    .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 20; border-bottom: 2px solid #e2e8f0; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
  <script>
    window.react = window.React;
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW Reg failed', e));
      });
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="compatibility-overlay">
    <div style="font-size: 4rem; margin-bottom: 2rem;">🚀</div>
    <h2 style="font-weight: 900; font-size: 1.5rem; color: #1e293b;">Browser Not Supported / 環境不支援</h2>
    <p style="color: #64748b; margin: 1rem 0; max-width: 400px; line-height: 1.6;">
      REL Portal requires the <b>File System Access API</b> to manage local Excel files.<br/>
      Please use <b>Google Chrome</b> or <b>Microsoft Edge</b> on a Desktop and ensure the site is running under <b>HTTPS</b>.
    </p>
    <a href="https://www.google.com/chrome/" target="_blank" style="background: #4f46e5; color: #fff; padding: 0.75rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-weight: bold; margin-top: 1rem;">Download Chrome</a>
  </div>
  <div id="root"></div>
  <script>
    if (!window.showDirectoryPicker) {
      document.getElementById('compatibility-overlay').classList.add('active');
      document.getElementById('root').style.display = 'none';
    }
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // 自定義 SVG 圖示組件，完全不依賴外部 React 圖示庫，防止崩潰
    const Icons = {
      Records: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
      Tracking: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
      Config: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
      Readiness: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
      Docs: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
      Stats: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
      Inventory: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Settings: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    };

    const DB_NAME = 'HQA_LocalDB';
    const STORE_NAME = 'handles';

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const saveHandleToDB = async (handle) => {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(handle, 'dir_handle');
      return new Promise((res) => tx.oncomplete = res);
    };

    const getHandleFromDB = async () => {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get('dir_handle');
      return new Promise((res) => req.onsuccess = () => res(req.result));
    };

    async function verifyPermission(fileHandle, withWrite) {
      const opts = { mode: withWrite ? 'readwrite' : 'read' };
      if ((await fileHandle.queryPermission(opts)) === 'granted') return true;
      if ((await fileHandle.requestPermission(opts)) === 'granted') return true;
      return false;
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const RESULTS = ['On-going', 'Pass', 'Fail', 'On-hold', 'N/A', 'Not Start'];

    function App() {
      const [activeTab, setActiveTab] = useState('settings'); 
      const [records, setRecords] = useState([]);
      const [samples, setSamples] = useState([]);
      const [configsList, setConfigsList] = useState([]);
      const [readinessItems, setReadinessItems] = useState([]);
      const [documents, setDocuments] = useState([]);
      const [dirHandle, setDirHandle] = useState(null);
      const [message, setMessage] = useState('Welcome to REL Portal / 歡迎使用系統');
      const [isAdmin, setIsAdmin] = useState(false);
      const [inventoryGroupBy, setInventoryGroupBy] = useState('Keeper');
      const [inventorySubView, setInventorySubView] = useState('Detail');
      const [searchTerm, setSearchTerm] = useState('');

      useEffect(() => {
        const init = async () => {
          const stored = await getHandleFromDB();
          if (stored && await verifyPermission(stored, true)) {
            setDirHandle(stored);
            await loadData(stored);
            setActiveTab('records');
          }
        };
        init();
      }, []);

      const loadData = async (handle) => {
        try {
          let latest = null; let latestDate = '';
          for await (const entry of handle.values()) {
            if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_')) {
              const d = entry.name.match(/\d{8}/)?.[0];
              if (d && d > latestDate) { latestDate = d; latest = entry; }
            }
          }
          if (!latest) { setMessage('No project file found.'); return; }
          const file = await latest.getFile();
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: 'array' });
          const get = (n) => XLSX.utils.sheet_to_json(wb.Sheets[n]||{}).map(r => ({id: generateId(), ...r}));
          setRecords(get('Records')); setSamples(get('Tracking')); setConfigsList(get('Config'));
          setReadinessItems(get('Readiness')); setDocuments(get('Documents'));
          setMessage('Project Loaded / 資料已載入');
        } catch (e) { setMessage('Load Error / 載入失敗'); }
      };

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50 font-sans antialiased text-slate-900">
          {/* 側邊欄 */}
          <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm z-50">
            <div className="p-6 border-b border-slate-100 bg-white">
              <div className="flex items-center gap-3">
                 <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><Icons.Records /></div>
                 <div className="flex flex-col">
                    <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase">Portal</span>
                    <span className="text-lg font-black text-indigo-900 leading-tight">REL PORTAL</span>
                 </div>
              </div>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
              {[
                { id: 'records', zh: '實驗記錄', en: 'RECORDS', icon: Icons.Records },
                { id: 'tracking', zh: '樣品追蹤', en: 'TRACKING', icon: Icons.Tracking },
                { id: 'config', zh: '機台配置', en: 'CONFIG', icon: Icons.Config },
                { id: 'readiness', zh: '物料準備', en: 'READINESS', icon: Icons.Readiness },
                { id: 'documents', zh: '文件中心', en: 'DOCUMENTS', icon: Icons.Docs },
                { id: 'stats', zh: '綜合統計', en: 'STATS', icon: Icons.Stats },
                { id: 'inventory', zh: '庫存儀表', en: 'INVENTORY', icon: Icons.Inventory }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full group flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-500 hover:bg-slate-50 hover:text-indigo-600'}`}>
                  <tab.icon />
                  <span className="flex flex-col items-start leading-none pointer-events-none">
                    <span className="text-[9px] font-black uppercase opacity-50 mb-0.5">{tab.en}</span>
                    <span className="text-[14px] font-bold">{tab.zh}</span>
                  </span>
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-slate-100 flex flex-col gap-2">
               <button onClick={() => setIsAdmin(!isAdmin)} className="w-full flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-all font-bold uppercase text-[10px]">
                 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                 {isAdmin ? 'Admin View' : 'User View'}
               </button>
               <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all font-bold uppercase text-[10px] ${activeTab==='settings'?'bg-indigo-50 text-indigo-600':'text-slate-400 hover:bg-slate-50'}`}>
                 <Icons.Settings /> Settings / 設定
               </button>
            </div>
          </aside>

          {/* 主區域 */}
          <main className="flex-1 flex flex-col relative bg-white overflow-hidden overflow-y-auto">
            <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-40">
              <div className="flex items-center gap-4">
                 <h2 className="text-lg font-black text-slate-800 uppercase tracking-tighter">{activeTab}</h2>
                 <div className="h-4 w-[1px] bg-slate-200"></div>
                 <span className="text-xs font-bold text-slate-400">{message}</span>
              </div>
              <div className="relative">
                 <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                 <input type="text" placeholder="Quick Search..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="bg-slate-100 border-none rounded-2xl py-2 pl-10 pr-4 text-sm w-64 focus:ring-2 focus:ring-indigo-500 transition-all" />
              </div>
            </header>

            <section className="flex-1 p-8">
              {!dirHandle && activeTab !== 'settings' ? (
                <div className="h-[60vh] flex flex-col items-center justify-center text-center space-y-6">
                  <div className="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center text-indigo-600"><Icons.Config /></div>
                  <div className="space-y-2">
                    <h3 className="text-xl font-black text-slate-800">No Project Connected</h3>
                    <p className="text-slate-400 text-sm max-w-sm mx-auto">Please select a local folder to start managing your data.</p>
                  </div>
                  <button onClick={() => setActiveTab('settings')} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all uppercase text-sm">Open Settings</button>
                </div>
              ) : activeTab === 'settings' ? (
                <div className="max-w-4xl mx-auto py-10">
                   <div className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-10">
                      <div>
                        <h2 className="text-3xl font-black text-slate-900 tracking-tight">System Configuration</h2>
                        <p className="text-slate-400 font-bold mt-1 uppercase text-xs tracking-widest">Connect your Local Workspace</p>
                      </div>
                      <div className="p-8 bg-slate-50 rounded-3xl border border-slate-200 flex items-center justify-between group hover:border-indigo-200 transition-colors">
                        <div className="flex gap-5 items-center">
                          <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm text-indigo-600 group-hover:scale-110 transition-transform"><Icons.Records /></div>
                          <div className="flex flex-col">
                            <span className="text-base font-black text-slate-800">Work Directory / 專案目錄</span>
                            <span className="text-sm font-semibold text-slate-400">{dirHandle ? `Connected: ${dirHandle.name}` : 'No folder linked'}</span>
                          </div>
                        </div>
                        <button onClick={connectDirectory} className="bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white px-8 py-2.5 rounded-xl font-black transition-all shadow-indigo-100 shadow-lg">Link Folder</button>
                      </div>
                   </div>
                </div>
              ) : (
                <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                  <div className="flex items-center justify-center py-20 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                    <div className="text-center space-y-4">
                      <Icons.Records />
                      <p className="font-bold text-sm">Dashboard Ready. Waiting for local files permission.</p>
                      <p className="text-xs">If files are loaded, use the sidebar to navigate / 資料已就緒，請使用側邊欄切換模組。</p>
                    </div>
                  </div>
                </div>
              )}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
