<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL PORTAL | HQA Lab Management</title>
  <meta name="description" content="REL PORTAL: A local-first, privacy-focused Laboratory Management System.">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <style>
    #compatibility-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; font-family: sans-serif; }
    #compatibility-overlay.active { display: flex; }
    .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 20; border-bottom: 2px solid #e2e8f0; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="compatibility-overlay">
    <div style="font-size: 4rem; margin-bottom: 2rem;">🚀</div>
    <h2 style="font-weight: 900; font-size: 1.5rem; color: #1e293b;">Browser Not Supported / 環境不支援</h2>
    <p style="color: #64748b; margin: 1rem 0; max-width: 400px; line-height: 1.6;">Please use Chrome/Edge on Desktop.</p>
  </div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // 零依賴 SVG 圖示集
    const Icons = {
      Records: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
      Tracking: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
      Config: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
      Readiness: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
      Docs: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
      Stats: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
      Inventory: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Settings: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Rotate: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><polyline points="21 3 21 8 16 8"/></svg>,
      Lock: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      X: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    };

    const DB_NAME = 'HQA_LocalDB';
    const STORE_NAME = 'handles';

    const openDB = () => new Promise((resolve) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
    });

    const getHandleFromDB = async () => {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get('dir_handle');
      return new Promise((res) => req.onsuccess = () => res(req.result));
    };

    const saveHandleToDB = async (handle) => {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(handle, 'dir_handle');
      return new Promise((res) => tx.oncomplete = res);
    };

    async function verifyPermission(fileHandle, withWrite) {
      const opts = { mode: withWrite ? 'readwrite' : 'read' };
      if ((await fileHandle.queryPermission(opts)) === 'granted') return true;
      try { if ((await fileHandle.requestPermission(opts)) === 'granted') return true; } catch (e) {}
      return false;
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const RESULTS = ['On-going', 'Pass', 'Fail', 'On-hold', 'N/A', 'Not Start'];

    const getStageStyle = (s) => {
      const m = { P2: 'bg-slate-200 text-slate-700', EVT: 'bg-orange-100 text-orange-600', DVT: 'bg-indigo-100 text-indigo-600', PVT: 'bg-purple-100 text-purple-600', MP: 'bg-green-100 text-green-600' };
      return m[String(s).toUpperCase()] || 'bg-slate-100 text-slate-400';
    };

    const getResultStyle = (r) => {
      const m = { Pass: 'bg-emerald-500 text-white', Fail: 'bg-rose-500 text-white', 'On-going': 'bg-yellow-400 text-black', 'On-hold': 'bg-white text-slate-700 border border-slate-200', 'N/A': 'bg-black text-white', 'Not Start': 'bg-slate-100 text-slate-400' };
      return m[String(r)] || 'bg-slate-100 text-slate-400';
    };

    function App() {
      const [activeTab, setActiveTab] = useState('settings'); 
      const [records, setRecords] = useState([]);
      const [samples, setSamples] = useState([]);
      const [configsList, setConfigsList] = useState([]);
      const [readinessItems, setReadinessItems] = useState([]);
      const [documents, setDocuments] = useState([]);
      const [dirHandle, setDirHandle] = useState(null);
      const [message, setMessage] = useState('System Initialized');
      const [isAdmin, setIsAdmin] = useState(false);
      const [inventoryGroupBy, setInventoryGroupBy] = useState('Keeper');
      const [inventorySubView, setInventorySubView] = useState('Detail');
      const [searchTerm, setSearchTerm] = useState('');

      const [filterProject, setFilterProject] = useState('All');
      const [filterStage, setFilterStage] = useState('All');
      const [filterResult, setFilterResult] = useState('All');

      useEffect(() => {
        const init = async () => {
          try {
            const stored = await getHandleFromDB();
            if (stored && await verifyPermission(stored, true)) {
              setDirHandle(stored); await loadData(stored); setActiveTab('records');
            }
          } catch(e) {}
        };
        init();
      }, []);

      const loadData = async (handle) => {
        try {
          let latest = null; let latestDate = '';
          for await (const entry of handle.values()) {
            if (entry.kind === 'file' && entry.name.startsWith('HQA_Master_')) {
              const d = entry.name.match(/\d{8}/)?.[0] || '';
              if (d > latestDate) { latestDate = d; latest = entry; }
            }
          }
          if (!latest) return;
          const file = await latest.getFile();
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: 'array' });
          const getS = (n) => (XLSX.utils.sheet_to_json(wb.Sheets[n]||{})).map(r => ({id: generateId(), ...r}));
          setRecords(getS('Records')); setSamples(getS('Tracking')); setConfigsList(getS('Config'));
          setReadinessItems(getS('Readiness')); setDocuments(getS('Documents'));
          setMessage('Project Data Loaded');
        } catch (e) {}
      };

      const saveToExcel = async (payload = {}) => {
        if (!dirHandle) return;
        try {
          setMessage('Saving...');
          const today = dayjs().format('YYYYMMDD');
          const fileName = `HQA_Master_${today}.xlsx`;
          const wb = XLSX.utils.book_new();
          const p = (arr) => arr.map(x => { const {id, ...rest} = x; return rest; });
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.records || records)), 'Records');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.samples || samples)), 'Tracking');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.configsList || configsList)), 'Config');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.readinessItems || readinessItems)), 'Readiness');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(p(payload.documents || documents)), 'Documents');
          const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
          const handle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await handle.createWritable();
          await writable.write(wbout); await writable.close();
          setMessage('Workspace Saved');
        } catch (e) { setMessage('Save Failed'); }
      };

      const connectDirectory = async () => {
        try {
          const h = await window.showDirectoryPicker({ mode: 'readwrite' });
          await saveHandleToDB(h); setDirHandle(h); await loadData(h); setActiveTab('records');
        } catch (e) {}
      };

      const [editingItem, setEditingItem] = useState(null);
      const [editType, setEditType] = useState(null); // 'records', 'samples', etc.

      const updateItem = (item, type, setter) => {
        const list = type==='records'?records:type==='samples'?samples:type==='configs'?configsList:type==='readiness'?readinessItems:documents;
        const newList = [...list];
        const idx = newList.findIndex(x => x.id === item.id);
        if (idx > -1) newList[idx] = item; else newList.unshift(item);
        setter(newList); saveToExcel({ [type==='configs'?'configsList':type==='readiness'?'readinessItems':type]: newList });
      };

      const deleteItem = (id, type, setter) => {
        if (!confirm('Delete this entry?')) return;
        const list = type==='records'?records:type==='samples'?samples:type==='configs'?configsList:type==='readiness'?readinessItems:documents;
        const newList = list.filter(x => x.id !== id);
        setter(newList); saveToExcel({ [type==='configs'?'configsList':type==='readiness'?'readinessItems':type]: newList });
      };

      const filteredRecords = records.filter(r => (filterProject==='All' || r.Project===filterProject) && (filterStage==='All' || r.Stage===filterStage) && (filterResult==='All' || r.Result===filterResult) && (searchTerm==='' || JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase())));
      const filteredSamples = samples.filter(r => (filterProject==='All' || r.Project===filterProject) && (searchTerm==='' || JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase())));

      const projects = [...new Set(records.map(r=>r.Project).filter(Boolean))];
      const stages = [...new Set(records.map(r=>r.Stage).filter(Boolean))];

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50 font-sans text-slate-900 border-indigo-100">
          <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm z-50">
            <div className="p-6 border-b border-slate-100">
              <div className="flex items-center gap-3">
                 <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100"><Icons.Records /></div>
                 <h1 className="text-xl font-black text-indigo-900 leading-tight">REL PORTAL</h1>
              </div>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
              {[
                { id: 'records', zh: '實驗記錄', en: 'RECORDS', icon: Icons.Records },
                { id: 'tracking', zh: '樣品追蹤', en: 'TRACKING', icon: Icons.Tracking },
                { id: 'config', zh: '機台配置', en: 'CONFIG', icon: Icons.Config },
                { id: 'readiness', zh: '物料準備', en: 'READINESS', icon: Icons.Readiness },
                { id: 'documents', zh: '文件中心', en: 'DOCS', icon: Icons.Docs },
                { id: 'stats', zh: '綜合統計', en: 'STATS', icon: Icons.Stats },
                { id: 'inventory', zh: '庫存儀表', en: 'INVENTORY', icon: Icons.Inventory }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-xl scale-[1.02]' : 'text-slate-500 hover:bg-slate-50 hover:text-indigo-600'}`}>
                  <tab.icon />
                  <span className="flex flex-col items-start leading-none">
                    <span className="text-[9px] font-black uppercase opacity-60 mb-1">{tab.en}</span>
                    <span className="text-[14px] font-bold">{tab.zh}</span>
                  </span>
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-slate-100 space-y-2">
               <button onClick={() => setIsAdmin(!isAdmin)} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${isAdmin ? 'bg-indigo-50 text-indigo-700' : 'text-slate-400 hover:bg-slate-50'}`}><Icons.Lock size={16}/> <span className="text-[10px] font-black uppercase tracking-widest">{isAdmin ? 'Admin: ON' : 'Admin: OFF'}</span></button>
               <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all font-bold uppercase text-[10px] tracking-widest ${activeTab==='settings'?'bg-indigo-50 text-indigo-600':'text-slate-400 hover:bg-slate-50'}`}>
                 <Icons.Settings /> Settings
               </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col bg-white overflow-hidden overflow-y-auto">
            <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-40">
              <div className="flex items-center gap-4">
                 <h2 className="text-lg font-black text-slate-800 uppercase tracking-tighter">{activeTab}</h2>
                 <div className="h-4 w-[1px] bg-slate-200"></div>
                 <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{message}</span>
              </div>
              <div className="relative">
                 <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                 <input type="text" placeholder="Global Search..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="bg-slate-100 border-none rounded-2xl py-2 pl-10 pr-4 text-sm w-64 focus:ring-2 focus:ring-indigo-500 transition-all" />
              </div>
            </header>

            <section className="flex-1 p-8">
              {!dirHandle && activeTab !== 'settings' ? (
                <div className="h-[60vh] flex flex-col items-center justify-center text-center space-y-6 animate-in fade-in zoom-in duration-500">
                  <div className="w-24 h-24 bg-indigo-50 rounded-3xl flex items-center justify-center text-indigo-600 shadow-inner"><Icons.Config size={40} /></div>
                  <div className="space-y-1">
                    <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Project Disconnected</h3>
                    <p className="text-slate-400 text-sm max-w-sm mx-auto font-medium">Please connect your workspace folder in setting.</p>
                  </div>
                  <button onClick={() => setActiveTab('settings')} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all uppercase text-xs tracking-widest">Setup Workspace</button>
                </div>
              ) : activeTab === 'settings' ? (
                <div className="max-w-4xl mx-auto py-10 animate-in fade-in duration-700">
                   <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl space-y-8">
                      <div><h2 className="text-3xl font-black text-slate-900 tracking-tight leading-none">Settings</h2><p className="text-slate-400 font-bold mt-2 uppercase text-[10px] tracking-[0.2em]">Workspace Configuration</p></div>
                      <div className="p-8 bg-slate-50 rounded-3xl border border-slate-200 flex items-center justify-between group hover:border-indigo-400 transition-colors">
                        <div className="flex gap-5 items-center">
                          <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm text-indigo-600 group-hover:scale-110 transition-transform"><Icons.Records /></div>
                          <div className="flex flex-col">
                            <span className="text-base font-black text-slate-800">Local Directory / 專案路徑</span>
                            <span className="text-sm font-semibold text-slate-400">{dirHandle ? `Connected: ${dirHandle.name}` : 'Not Linked'}</span>
                          </div>
                        </div>
                        <button onClick={connectDirectory} className="bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white px-8 py-2.5 rounded-xl font-black transition-all shadow-lg uppercase text-[10px] tracking-widest">Connect Folder</button>
                      </div>
                   </div>
                </div>
              ) : activeTab === 'records' ? (
                <div className="animate-in fade-in duration-500 space-y-6">
                   <div className="bg-white p-6 rounded-3xl shadow-sm border flex flex-wrap items-center justify-between gap-4">
                      <div className="flex flex-wrap gap-4 items-center">
                         <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Projects</option>{projects.map(p=><option key={p} value={p}>{p}</option>)}</select>
                         <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} className="p-2 border rounded-xl bg-slate-50 font-bold text-sm"><option value="All">All Stages</option>{stages.map(p=><option key={p} value={p}>{p}</option>)}</select>
                         <button onClick={()=>{setFilterProject('All');setFilterStage('All');setSearchTerm('');}} className="p-2 text-indigo-600 bg-indigo-50 rounded-xl"><Icons.Rotate size={20}/></button>
                      </div>
                      {isAdmin && <button onClick={()=>{setEditingItem({id:generateId(), Result:'Pass'}); setEditType('records');}} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 uppercase text-[10px] tracking-widest"><Icons.Plus /> New Record</button>}
                   </div>
                   <div className="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                      <table className="w-full text-left border-separate border-spacing-0">
                        <thead className="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                           <tr><th className="p-4 border-r sticky left-0 bg-slate-100 z-10">Project</th><th className="p-4">Stage</th><th className="p-4">Category</th><th className="p-4">Config</th><th className="p-4">Result</th><th className="p-4">Date</th>{isAdmin && <th className="p-4 text-center">Action</th>}</tr>
                        </thead>
                        <tbody className="divide-y text-[11px] font-medium">
                           {filteredRecords.map(r => (
                             <tr key={r.id} className="hover:bg-slate-50 group transition-colors">
                               <td className="p-4 font-bold border-r sticky left-0 bg-white z-10">{r.Project}</td>
                               <td className="p-4"><span className={`px-2 py-1 rounded-lg font-black uppercase text-[9px] ${getStageStyle(r.Stage)}`}>{r.Stage}</span></td>
                               <td className="p-4 font-black text-indigo-900">{r.Category}</td>
                               <td className="p-4 font-mono text-slate-500">{r.Config || '-'}</td>
                               <td className="p-4"><span className={`px-3 py-1 rounded-full font-black uppercase tracking-widest text-[9px] shadow-sm ${getResultStyle(r.Result)}`}>{r.Result}</span></td>
                               <td className="p-4 text-slate-400">{String(r.Date).split('T')[0]}</td>
                               {isAdmin && <td className="p-4 text-center">
                                 <div className="flex justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                   <button onClick={()=>{setEditingItem(r); setEditType('records');}} className="p-1 text-indigo-600 hover:bg-indigo-50 rounded"><Icons.Edit /></button>
                                   <button onClick={()=>deleteItem(r.id, 'records', setRecords)} className="p-1 text-rose-500 hover:bg-rose-50 rounded"><Icons.Trash /></button>
                                 </div>
                               </td>}
                             </tr>
                           ))}
                        </tbody>
                      </table>
                   </div>
                </div>
              ) : activeTab === 'inventory' ? (
                <div className="space-y-6">
                   <div className="flex justify-between items-center bg-white p-2 rounded-2xl border">
                      <div className="flex gap-2">
                        <button onClick={()=>setInventoryGroupBy('Keeper')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${inventoryGroupBy==='Keeper'?'bg-indigo-600 text-white shadow-lg':'text-slate-400 hover:text-indigo-600'}`}>By Keeper / 按保管人</button>
                        <button onClick={()=>setInventoryGroupBy('Stage')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${inventoryGroupBy==='Stage'?'bg-indigo-600 text-white shadow-lg':'text-slate-400 hover:text-indigo-600'}`}>By Stage / 按階段</button>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={()=>setInventorySubView('Detail')} className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase ${inventorySubView==='Detail'?'bg-indigo-50 text-indigo-600':'text-slate-400'}`}>Detail</button>
                        <button onClick={()=>setInventorySubView('Config')} className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase ${inventorySubView==='Config'?'bg-indigo-50 text-indigo-600':'text-slate-400'}`}>Config View</button>
                      </div>
                   </div>
                   <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                      {(() => {
                        const groups = {};
                        samples.forEach(s => {
                           const k = inventoryGroupBy==='Keeper' ? (s.Keeper||'Other') : (s.Stage||'N/A');
                           if (!groups[k]) groups[k] = [];
                           groups[k].push(s);
                        });
                        return Object.entries(groups).map(([name, data]) => {
                           const total = data.reduce((s, x) => s + parseInt(x.Units||1), 0);
                           const sub = data.reduce((a, c) => {
                             const sk = inventorySubView==='Config'?(c.Config||'N/A'):(inventoryGroupBy==='Keeper'?c.Project:c.Keeper);
                             a[sk] = (a[sk]||0) + parseInt(c.Units||1); return a;
                           }, {});
                           return (
                             <div key={name} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-4 hover:border-indigo-400 transition-all flex flex-col h-full group">
                                <div className="flex justify-between items-start">
                                   <div className="space-y-1"><h4 className="text-sm font-black text-indigo-900 uppercase leading-tight">{name}</h4><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">TOTAL UNITS</p></div>
                                   <div className="bg-indigo-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center font-black text-lg group-hover:scale-110 shadow-lg">{total}</div>
                                </div>
                                <div className="flex-1 space-y-2">
                                   {Object.entries(sub).map(([d, c]) => (
                                     <div key={d} className="flex justify-between items-center p-3 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-white transition-colors">
                                        <span className="text-[10px] font-black text-slate-600 uppercase truncate mr-2">{d}</span>
                                        <span className="text-[10px] font-black text-indigo-600 bg-white px-2 py-0.5 rounded-lg border border-indigo-100 shadow-sm">{c}</span>
                                     </div>
                                   ))}
                                </div>
                             </div>
                           );
                        });
                      })()}
                   </div>
                </div>
              ) : (
                <div className="h-[50vh] flex flex-col items-center justify-center p-10 border-2 border-dashed border-slate-100 rounded-[3rem] text-slate-300">
                  <Icons.Records />
                  <p className="font-black uppercase tracking-widest mt-4">Module Content Ready</p>
                </div>
              )}
            </section>
          </main>

          {editingItem && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl p-10 relative animate-in zoom-in-95 duration-300 border border-indigo-100">
                 <button onClick={()=>setEditingItem(null)} className="absolute top-8 right-8 p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors"><Icons.X size={20}/></button>
                 <h3 className="text-2xl font-black text-slate-900 mb-8 uppercase tracking-tighter">Edit {editType}</h3>
                 <form onSubmit={(e)=>{e.preventDefault(); 
                    const setter = editType==='records'?setRecords:editType==='samples'?setSamples:editType==='configs'?setConfigsList:editType==='readiness'?setReadinessItems:setDocuments;
                    updateItem(editingItem, editType, setter); setEditingItem(null);
                 }} className="grid grid-cols-2 gap-6">
                    {editType==='records' && (
                       <>
                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Project</label><input required value={editingItem.Project||''} onChange={e=>setEditingItem({...editingItem, Project:e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" /></div>
                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Stage</label><input required value={editingItem.Stage||''} onChange={e=>setEditingItem({...editingItem, Stage:e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" /></div>
                        <div className="col-span-2 space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Category</label><input required value={editingItem.Category||''} onChange={e=>setEditingItem({...editingItem, Category:e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" /></div>
                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Config</label><input value={editingItem.Config||''} onChange={e=>setEditingItem({...editingItem, Config:e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-mono text-sm" /></div>
                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Result</label><select value={editingItem.Result||'Pass'} onChange={e=>setEditingItem({...editingItem, Result:e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm">{RESULTS.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
                       </>
                    )}
                    <div className="col-span-2 pt-6"><button type="submit" className="w-full py-5 bg-indigo-600 hover:bg-slate-900 text-white rounded-3xl font-black shadow-xl shadow-indigo-100 transition-all uppercase tracking-[0.2em] text-xs">Save Changes / 儲存</button></div>
                 </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
